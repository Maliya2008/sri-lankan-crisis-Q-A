<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SolidPolls — Interactive Perspective Platform</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Theme Customizations -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "-apple-system", "sans-serif"],
              mono: ["JetBrains Mono", "ui-monospace", "SFMono-Regular", "monospace"],
            },
          },
        },
      };
    </script>
    
    <!-- Custom styling to prevent flash of unstyled icons / smooth animations -->
    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#fafafa] flex flex-col font-sans text-slate-800 leading-normal antialiased selection:bg-indigo-100 selection:text-indigo-900">
    
    <!-- MAIN MOUNT CONTAINER -->
    <div id="app" class="flex flex-col min-h-screen"></div>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Master Single-File JavaScript App -->
    <script>
      // KEY IDENTIFIERS
      const STORAGE_POLLS_KEY = "simple_polls_data";
      const STORAGE_SITE_CONFIG_KEY = "simple_polls_site_config";
      const STORAGE_USER_VOTES_KEY = "simple_polls_user_votes";

      // PRESET COLOR OPTIONS FOR POLLS
      const COLOR_PRESETS = [
        { id: "indigo", bg: "bg-slate-900 border-b-4 border-indigo-500", text: "text-slate-100", label: "Dark Indigo Accent" },
        { id: "emerald", bg: "bg-[#064e3b] border-b-4 border-emerald-400", text: "text-emerald-50", label: "Forest Emerald" },
        { id: "rose", bg: "bg-[#881337] border-b-4 border-rose-400", text: "text-rose-50", label: "Sunset Ruby" },
        { id: "violet", bg: "bg-indigo-950 border-b-4 border-violet-400", text: "text-violet-50", label: "Solid Deep Violet" },
        { id: "amber", bg: "bg-[#78350f] border-b-4 border-amber-400", text: "text-amber-50", label: "Honey Amber" },
        { id: "coal", bg: "bg-zinc-900 border-b-4 border-slate-450", text: "text-zinc-100", label: "Midnight Carbon" }
      ];

      // DEFAULT BACKUPS
      const DEFAULT_SITE_CONFIG = {
        brandName: "SolidPolls",
        brandSub: "Interactive Engine",
        homeTitle: "Human Perspectives",
        homeSubtitle: "Cast your vote across our primary design, productivity, and lifestyle surveys to view immediate recommendations & custom breakdown stats.",
        footerText: "A highly-polished modern aesthetic feedback engine. Crafted for simple digital decisions.",
        primaryAccentColor: "bg-indigo-600",
        accentTextColor: "text-indigo-600",
        navItems: [
          { id: "nav-polls", label: "Live Polls", path: "/", iconName: "Vote" },
          { id: "nav-stats", label: "Collective Stats", path: "/stats", iconName: "BarChart3" },
          { id: "nav-admin", label: "Admin Console", path: "/admin", iconName: "Shield", badgeText: "Control" }
        ]
      };

      const INITIAL_POLLS = [
        {
          id: "poll-productivity",
          question: "How do you organize your daily deep-work sessions?",
          description: "Select the primary time management method that aligns with your professional focus style.",
          category: "Workflow",
          headingColor: "bg-slate-900 border-b-4 border-indigo-500",
          textColor: "text-slate-100",
          accentColor: "bg-indigo-600 hover:bg-indigo-700 text-white",
          options: [
            { id: "opt-prod-1", text: "The Pomodoro Loop (25m Focus / 5m Rest)", votes: 142, response: "Highly effective for maintaining high cognitive endurance across long developer sprints." },
            { id: "opt-prod-2", text: "90-Minute High-Intensity Focus Intervals", votes: 98, response: "Allows deep-dives into complex algorithms without interrupting creative state flows." },
            { id: "opt-prod-3", text: "Task-Driven Execution (No timer limits)", votes: 64, response: "Excellent for practitioners who prioritize output momentum over rigid time blocks." }
          ]
        },
        {
          id: "poll-design",
          question: "What is your primary design system guideline priority?",
          description: "Decide whether high architectural spacing, rigorous semantic color presets, or flexible layouts guide your frontend.",
          category: "Aesthetics",
          headingColor: "bg-[#064e3b] border-b-4 border-emerald-400",
          textColor: "text-emerald-50",
          accentColor: "bg-emerald-600 hover:bg-emerald-700 text-white",
          options: [
            { id: "opt-ds-1", text: "Tight Structural Layout (High Information Density)", votes: 110, response: "Perfect for dashboard consoles and technical applications requiring multi-metric tracking." },
            { id: "opt-ds-2", text: "Generous Negative Space (Swiss/Modern Slate)", votes: 175, response: "Conveys an airy, premium feeling. Highly recommended for creative portfolios and landing pages." },
            { id: "opt-ds-3", text: "Atomic Component Autonomy (No restrictive rules)", votes: 45, response: "Provides maximum developer freedom but risks styling drift as team size scales." }
          ]
        },
        {
          id: "poll-lifestyle",
          question: "How does your team capture meeting conclusions?",
          description: "Select the communication framework that serves as your central repository.",
          category: "Productivity",
          headingColor: "bg-[#881337] border-b-4 border-rose-400",
          textColor: "text-rose-50",
          accentColor: "bg-rose-600 hover:bg-rose-700 text-white",
          options: [
            { id: "opt-ls-1", text: "AI-Powered Meeting Recorders & Summarizers", votes: 231, response: "Ensures complete alignment, freeing practitioners to engage fully in active discussion." },
            { id: "opt-ls-2", text: "Collaborative Real-time Shared Notebooks", votes: 120, response: "Encourages collective participation and immediate alignment on direct action points." },
            { id: "opt-ls-3", text: "Minimalist Bullet Logs (Strict human summaries)", votes: 89, response: "Avoids administrative noise and retains high focus on core executive items." }
          ]
        }
      ];

      // CORE APP STATE
      let polls = [];
      let siteConfig = {};
      let userVotes = {};
      let currentRoute = window.location.pathname;

      // ADMIN EDIT STATE
      let activeAdminTab = "polls"; // "polls" or "site"
      let isEditingPoll = false;
      let editingPollId = null;
      let pollFormQuestion = "";
      let pollFormCategory = "Directives";
      let pollFormDescription = "";
      let pollFormSelectedColorIdx = 0; // index inside COLOR_PRESETS or -1 for custom theme
      let pollFormCustomBg = "";
      let pollFormCustomText = "";
      let pollFormOptions = [
        { text: "Option A", response: "Excellent choice! You possess the traits of a builder.", votes: 0 },
        { text: "Option B", response: "Intriguing angle. You see opportunities in every challenge.", votes: 0 },
        { text: "Option C", response: "Pragmatic decision. Reliability is your finest quality.", votes: 0 }
      ];

      // SITE SETTINGS FORM STATES
      let siteFormBrandName = "";
      let siteFormBrandSub = "";
      let siteFormHomeTitle = "";
      let siteFormHomeSubtitle = "";
      let siteFormPrimaryAccent = "";
      let siteFormAccentText = "";
      let siteFormFooterText = "";
      let siteFormNavItems = [];

      // HELPER: Convert pascal/camel cases to lowercase hyphenated strings for Lucide Icon parser
      function formatLucideIcon(name) {
        if (!name) return "help-circle";
        return name
          .replace(/([a-z0-0])([A-Z])/g, '$1-$2')
          .replace(/\s+/g, '-')
          .toLowerCase();
      }

      // STATE LOADING ENGINE
      function initAppState() {
        try {
          const storedPolls = localStorage.getItem(STORAGE_POLLS_KEY);
          if (storedPolls) {
            polls = JSON.parse(storedPolls);
          } else {
            polls = INITIAL_POLLS;
            localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(INITIAL_POLLS));
          }

          const storedConfig = localStorage.getItem(STORAGE_SITE_CONFIG_KEY);
          if (storedConfig) {
            siteConfig = JSON.parse(storedConfig);
          } else {
            siteConfig = DEFAULT_SITE_CONFIG;
            localStorage.setItem(STORAGE_SITE_CONFIG_KEY, JSON.stringify(DEFAULT_SITE_CONFIG));
          }

          const storedVotes = localStorage.getItem(STORAGE_USER_VOTES_KEY);
          if (storedVotes) {
            userVotes = JSON.parse(storedVotes);
          } else {
            userVotes = {};
          }

          // Back synchronizations to admin forms
          syncAdminFormFields();
        } catch (e) {
          console.error("State initialization failed, resetting safely", e);
          polls = INITIAL_POLLS;
          siteConfig = DEFAULT_SITE_CONFIG;
          userVotes = {};
          syncAdminFormFields();
        }
      }

      function syncAdminFormFields() {
        siteFormBrandName = siteConfig.brandName || "SolidPolls";
        siteFormBrandSub = siteConfig.brandSub || "Interactive Engine";
        siteFormHomeTitle = siteConfig.homeTitle || "Human Perspectives";
        siteFormHomeSubtitle = siteConfig.homeSubtitle || "Cast your vote.";
        siteFormPrimaryAccent = siteConfig.primaryAccentColor || "bg-indigo-600";
        siteFormAccentText = siteConfig.accentTextColor || "text-indigo-600";
        siteFormFooterText = siteConfig.footerText || "A highly-polished feedback app.";
        siteFormNavItems = JSON.parse(JSON.stringify(siteConfig.navItems || []));
      }

      // VOTE ENGINE TRIGGERS
      function castVote(pollId, optionId) {
        polls = polls.map(p => {
          if (p.id === pollId) {
            return {
              ...p,
              options: p.options.map(opt => {
                if (opt.id === optionId) {
                  return { ...opt, votes: opt.votes + 1 };
                }
                return opt;
              })
            };
          }
          return p;
        });

        userVotes[pollId] = optionId;
        localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
        localStorage.setItem(STORAGE_USER_VOTES_KEY, JSON.stringify(userVotes));
        renderApp();
      }

      function retractVote(pollId) {
        const previousVoteId = userVotes[pollId];
        if (!previousVoteId) return;

        polls = polls.map(p => {
          if (p.id === pollId) {
            return {
              ...p,
              options: p.options.map(opt => {
                if (opt.id === previousVoteId) {
                  return { ...opt, votes: Math.max(0, opt.votes - 1) };
                }
                return opt;
              })
            };
          }
          return p;
        });

        delete userVotes[pollId];
        localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
        localStorage.setItem(STORAGE_USER_VOTES_KEY, JSON.stringify(userVotes));
        renderApp();
      }

      // NAVIGATION EVENTS
      function routeTo(path) {
        window.history.pushState(null, "", path);
        currentRoute = path;
        window.scrollTo({ top: 0, behavior: "smooth" });
        renderApp();
      }

      // POPSTATE BROWSING BIND
      window.addEventListener("popstate", () => {
        currentRoute = window.location.pathname;
        renderApp();
      });

      // CORE RENDERING ROUTE SWITCH
      function renderApp() {
        const appContainer = document.getElementById("app");
        if (!appContainer) return;

        // Header Component
        let navItemsData = siteConfig.navItems || [];
        let pollsCount = polls.length;

        let navHTML = `
          <nav id="app-navbar" class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div class="flex items-center justify-between h-16">
                <!-- Branding logo block -->
                <div onclick="routeTo('/')" class="flex items-center gap-2.5 cursor-pointer group">
                  <div class="w-9 h-9 rounded-xl ${siteConfig.primaryAccentColor || 'bg-slate-900'} flex items-center justify-center text-white transition-all duration-300 shadow-sm">
                    <i data-lucide="vote" class="w-5 h-5"></i>
                  </div>
                  <div>
                    <span class="font-sans font-bold tracking-tight text-slate-900 block text-base md:text-lg">
                      ${siteConfig.brandName}
                    </span>
                    <span class="font-mono text-[10px] text-slate-400 block -mt-1 font-semibold uppercase tracking-wider">
                      ${siteConfig.brandSub}
                    </span>
                  </div>
                </div>

                <!-- Desktop links -->
                <div class="hidden md:flex items-center gap-1.5">
                  ${navItemsData.map(item => {
                    const isActive = currentRoute === item.path;
                    const cleanIcon = formatLucideIcon(item.iconName);
                    return `
                      <button 
                        onclick="routeTo('${item.path}')"
                        class="relative flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 ${
                          isActive 
                            ? `${siteConfig.accentTextColor} bg-slate-50 font-bold` 
                            : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50/50'
                        }"
                      >
                        <i data-lucide="${cleanIcon}" class="w-4 h-4 ${isActive ? siteConfig.accentTextColor : 'text-slate-400'}"></i>
                        <span>${item.label}</span>
                        ${item.badgeText ? `
                          <span class="inline-flex items-center px-1.5 py-0.2 rounded-full text-[9px] font-bold bg-indigo-50 text-indigo-600 uppercase tracking-widest border border-indigo-100/50">
                            ${item.badgeText}
                          </span>
                        ` : ''}
                      </button>
                    `;
                  }).join("")}
                </div>

                <!-- Mobile burger menu toggler -->
                <div class="md:hidden">
                  <button onclick="toggleMobileMenu()" class="p-2 rounded-lg text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition-colors">
                    <i data-lucide="menu" class="w-5 h-5" id="mobile-menu-burger-icon"></i>
                  </button>
                </div>
              </div>
            </div>

            <!-- Dynamic Mobile menu rails -->
            <div id="mobile-dropdown-menu" class="hidden md:hidden border-t border-slate-100 bg-white/95">
              <div class="px-3 py-4 space-y-1.5">
                ${navItemsData.map(item => {
                  const isActive = currentRoute === item.path;
                  const cleanIcon = formatLucideIcon(item.iconName);
                  return `
                    <button 
                      onclick="toggleMobileMenu(); routeTo('${item.path}')"
                      class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-left text-sm font-medium transition-colors ${
                        isActive 
                          ? 'bg-slate-900 text-white' 
                          : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'
                      }"
                    >
                      <div class="flex items-center gap-3">
                        <i data-lucide="${cleanIcon}" class="w-4.5 h-4.5 ${isActive ? 'text-white' : 'text-slate-400'}"></i>
                        <span>${item.label}</span>
                      </div>
                      ${item.badgeText ? `
                        <span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-[9px] font-bold uppercase tracking-widest ${
                          isActive ? 'bg-white/20 text-white' : 'bg-indigo-50 text-indigo-600'
                        }">
                          ${item.badgeText}
                        </span>
                      ` : ''}
                    </button>
                  `;
                }).join("")}
              </div>
            </div>
          </nav>
        `;

        // Interactive Page Banner/Section Header
        let activeNavLabel = "";
        if (currentRoute === "/") activeNavLabel = "Live Polls";
        else if (currentRoute === "/stats") activeNavLabel = "Collective Stats";
        else if (currentRoute === "/admin") activeNavLabel = "Admin Console";
        else {
          const item = siteConfig.navItems?.find(n => n.path === currentRoute);
          activeNavLabel = item ? item.label : "Active Custom Workspace";
        }

        let mainHeading = "";
        let subHeading = "";
        if (currentRoute === "/") {
          mainHeading = siteConfig.homeTitle;
          subHeading = siteConfig.homeSubtitle;
        } else if (currentRoute === "/stats") {
          mainHeading = "Data Visualizations";
          subHeading = "Aggregated comparative analytics derived from real interactive telemetry registered during active browser sessions.";
        } else if (currentRoute === "/admin") {
          mainHeading = "Directory Control";
          subHeading = "Configure active polling campaigns, manage existing selections, change branding styles, and broadcast customized options instantly.";
        } else {
          mainHeading = activeNavLabel;
          subHeading = "Welcome to your dynamically customizable workspace folder. Use the Admin Panel to modify this view layout.";
        }

        let metaHeaderHTML = `
          <div id="page-metadata-header" class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4 animate-fade-in animate-duration-300">
            <div>
              <div class="flex items-center gap-1.5 text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 font-mono">
                <span>${siteConfig.brandName} Workspace</span>
                <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-slate-350"></i>
                <span class="${siteConfig.accentTextColor} font-semibold">${activeNavLabel}</span>
              </div>
              
              <h1 class="font-sans font-extrabold text-slate-900 text-3xl md:text-4xl tracking-tight leading-none mt-1">
                ${mainHeading}
              </h1>
              
              <p class="font-sans text-sm text-slate-500 mt-2 max-w-2xl leading-relaxed">
                ${subHeading}
              </p>
            </div>

            <!-- Total active counters widget block -->
            ${currentRoute !== "/admin" ? `
              <div class="bg-white border border-slate-100 p-4.5 rounded-2xl shadow-sm flex items-center gap-4.5 shrink-0 max-w-sm">
                <div class="w-10 h-10 rounded-xl ${siteConfig.primaryAccentColor || 'bg-slate-900'} text-white flex items-center justify-center shrink-0">
                  <i data-lucide="vote" class="w-5 h-5"></i>
                </div>
                <div class="text-xs">
                  <div class="font-mono font-bold text-slate-500 uppercase tracking-wider">Active Campaigns</div>
                  <div class="font-sans font-bold text-slate-900 text-base mt-0.5">${pollsCount} Live Polls</div>
                </div>
              </div>
            ` : ""}
          </div>
        `;

        // Switch to compile appropriate view body HTML
        let viewBodyHTML = "";
        if (currentRoute === "/admin") {
          viewBodyHTML = renderAdminPanel();
        } else if (currentRoute === "/stats") {
          viewBodyHTML = renderStatsDashboard();
        } else {
          viewBodyHTML = renderPollsList();
        }

        // Complete Frame Output Build
        appContainer.innerHTML = `
          ${navHTML}
          
          <main id="app-main-content" class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-10">
            ${metaHeaderHTML}
            <div id="route-panel-mount">
              ${viewBodyHTML}
            </div>
          </main>

          <!-- Footer static component -->
          <footer id="app-footer" class="bg-white border-t border-slate-100 mt-16 py-10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-center md:text-left">
                  <span class="font-sans font-extrabold tracking-tight text-slate-900 text-sm">
                    ${siteConfig.brandName}
                  </span>
                  <p class="font-sans text-xs text-slate-400 mt-1 max-w-md">
                    ${siteConfig.footerText}
                  </p>
                </div>
                
                <div class="flex items-center gap-5">
                  ${navItemsData.map(navItem => `
                    <button 
                      onclick="routeTo('${navItem.path}')"
                      class="font-sans text-xs transition-colors ${
                        currentRoute === navItem.path 
                          ? `${siteConfig.accentTextColor || 'text-slate-800'} font-bold`
                          : "text-slate-500 hover:text-slate-800 font-semibold"
                      }"
                    >
                      ${navItem.label}
                    </button>
                  `).join("")}
                </div>
              </div>
              
              <div class="border-t border-slate-50 mt-8 pt-6 flex flex-col sm:flex-row justify-between items-center gap-3">
                <span class="font-mono text-[10px] text-slate-400 font-semibold tracking-wider">
                  CLIENT STATE STORAGE • DYNAMIC SYNC
                </span>
                <span class="font-sans text-[11px] text-slate-400">
                  © ${new Date().getFullYear()} ${siteConfig.brandName}. All rights reserved.
                </span>
              </div>
            </div>
          </footer>
        `;

        // Trigger Lucide to render newly drawn elements instantly
        lucide.createIcons();
      }

      // NAV MOBILE TOGGLE ENGINE
      function toggleMobileMenu() {
        const menu = document.getElementById("mobile-dropdown-menu");
        const icon = document.getElementById("mobile-menu-burger-icon");
        if (!menu) return;
        
        if (menu.classList.contains("hidden")) {
          menu.classList.remove("hidden");
          if (icon) {
            icon.setAttribute("data-lucide", "x");
            lucide.createIcons();
          }
        } else {
          menu.classList.add("hidden");
          if (icon) {
            icon.setAttribute("data-lucide", "menu");
            lucide.createIcons();
          }
        }
      }

      /* =========================================================================
         VIEW: LIVE POLLS FEED
         ========================================================================= */
      function renderPollsList() {
        if (polls.length === 0) {
          return `
            <div class="text-center py-20 bg-white rounded-3xl border border-slate-100 shadow-sm max-w-xl mx-auto my-10 px-6">
              <div class="w-14 h-14 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="help-circle" class="w-8 h-8"></i>
              </div>
              <h3 class="font-sans font-bold text-slate-800 text-lg">No Live Campaigns Published</h3>
              <p class="font-sans text-slate-500 text-sm mt-1.5 max-w-sm mx-auto">
                Use the top-right Admin Console navigation links to author active polling campaigns.
              </p>
              <button onclick="routeTo('/admin')" class="mt-5 px-5 py-2.5 bg-slate-900 text-white rounded-xl font-sans text-xs font-bold hover:bg-slate-800 transition-colors">
                Open Admin Console
              </button>
            </div>
          `;
        }

        return `
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in">
            ${polls.map(poll => {
              const previousVoteId = userVotes[poll.id];
              const totalVotes = poll.options.reduce((sum, o) => sum + o.votes, 0);

              let bodyContentHTML = "";

              if (previousVoteId) {
                // USER HAS VOTED STATE - SHOW COMPARATIVE PROGRESS BARS AND CUSTOM FEEDBACK
                let votedOption = poll.options.find(o => o.id === previousVoteId);
                
                bodyContentHTML = `
                  <div class="space-y-4">
                    <!-- Option bars block -->
                    <div class="space-y-3.5">
                      ${poll.options.map(opt => {
                        const isThisVoted = opt.id === previousVoteId;
                        const percentage = totalVotes > 0 ? Math.round((opt.votes / totalVotes) * 100) : 0;
                        
                        return `
                          <div class="space-y-1">
                            <div class="flex justify-between items-center text-xs">
                              <span class="font-sans font-bold ${isThisVoted ? 'text-slate-900' : 'text-slate-600'} flex items-center gap-1.5 truncate pr-2">
                                ${isThisVoted ? '<span class="w-2 h-2 rounded-full bg-emerald-500 shrink-0"></span>' : ''}
                                ${opt.text}
                              </span>
                              <span class="font-mono font-extrabold text-slate-500 shrink-0">
                                ${opt.votes} votes (${percentage}%)
                              </span>
                            </div>
                            <!-- Bar graphics wrapper -->
                            <div class="w-full h-3 bg-slate-100 rounded-lg overflow-hidden relative border border-slate-200/20">

      /* =========================================================================
         VIEW: COLLECTIVE STATISTICS
         ========================================================================= */
      function renderStatsDashboard() {
        if (polls.length === 0) {
          return `
            <div class="text-center py-20 bg-white rounded-3xl border border-slate-100 shadow-sm max-w-xl mx-auto my-10 px-6">
              <i data-lucide="bar-chart-3" class="w-10 h-10 text-slate-350 mx-auto mb-3"></i>
              <h3 class="font-sans font-bold text-slate-800 text-lg">No Stats Records Registered</h3>
            </div>
          `;
        }

        // Aggregate stats
        let totalCamps = polls.length;
        let totalVotesGlobal = 0;
        let categoriesSet = new Set();
        let topOptionName = "None Registered";
        let topOptionVotes = 0;

        polls.forEach(p => {
          categoriesSet.add(p.category);
          p.options.forEach(o => {
            totalVotesGlobal += o.votes;
            if (o.votes > topOptionVotes) {
              topOptionVotes = o.votes;
              topOptionName = `"${o.text}" (${p.category})`;
            }
          });
        });

        return `
          <div class="space-y-8 animate-fade-in">
            <!-- Aggregated Metrics Cards Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
              
              <div class="bg-white rounded-2xl p-5 border border-slate-150 shadow-sm flex items-center gap-4">
                <div class="w-11 h-11 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center shrink-0">
                  <i data-lucide="bar-chart-3" class="w-5.5 h-5.5"></i>
                </div>
                <div>
                  <div class="font-mono text-[9px] text-slate-400 font-extrabold uppercase tracking-widest">Global Telemetry</div>
                  <div class="font-sans font-black text-slate-900 text-xl leading-none mt-1">${totalVotesGlobal}</div>
                  <div class="font-sans text-[11px] text-slate-400 mt-0.5">Total Votes Registered</div>
                </div>
              </div>

              <div class="bg-white rounded-2xl p-5 border border-slate-150 shadow-sm flex items-center gap-4">
                <div class="w-11 h-11 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center shrink-0">
                  <i data-lucide="check" class="w-5.5 h-5.5"></i>
                </div>
                <div>
                  <div class="font-mono text-[9px] text-slate-400 font-extrabold uppercase tracking-widest">Active Channels</div>
                  <div class="font-sans font-black text-slate-900 text-xl leading-none mt-1">${totalCamps}</div>
                  <div class="font-sans text-[11px] text-slate-400 mt-0.5">Custom Live Polls</div>
                </div>
              </div>

              <div class="bg-white rounded-2xl p-5 border border-slate-150 shadow-sm flex items-center gap-4">
                <div class="w-11 h-11 rounded-xl bg-rose-50 text-rose-600 flex items-center justify-center shrink-0">
                  <i data-lucide="layers" class="w-5.5 h-5.5"></i>
                </div>
                <div>
                  <div class="font-mono text-[9px] text-slate-400 font-extrabold uppercase tracking-widest">Unique Clusters</div>
                  <div class="font-sans font-black text-slate-900 text-xl leading-none mt-1">${categoriesSet.size}</div>
                  <div class="font-sans text-[11px] text-slate-400 mt-0.5">Categories Customised</div>
                </div>
              </div>

              <div class="bg-white rounded-2xl p-5 border border-slate-150 shadow-sm flex items-center gap-4 col-span-1 sm:col-span-2 lg:col-span-1">
                <div class="w-11 h-11 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center shrink-0">
                  <i data-lucide="sparkles" class="w-5.5 h-5.5"></i>
                </div>
                <div class="min-w-0">
                  <div class="font-mono text-[9px] text-slate-400 font-extrabold uppercase tracking-widest">Top Voted Choice</div>
                  <div class="font-sans font-black text-slate-900 text-sm mt-1 truncate max-w-full">${topOptionName}</div>
                  <div class="font-sans text-[11px] text-slate-450 mt-0.5 shrink-0">${topOptionVotes} leading votes</div>
                </div>
              </div>

            </div>

            <!-- Detailed Breakdowns Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
              ${polls.map(p => {
                const pVotesSum = p.options.reduce((s, o) => s + o.votes, 0);
                return `
                  <div class="bg-white p-6 sm:p-7 rounded-3xl border border-slate-150 shadow-sm space-y-5">
                    <div>
                      <div class="flex justify-between items-start">
                        <span class="inline-flex px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider bg-slate-100 text-slate-600">
                          ${p.category}
                        </span>
                        <span class="font-mono text-[10px] text-slate-450 font-bold uppercase">${pVotesSum} cumulative votes</span>
                      </div>
                      <h4 class="font-sans font-extrabold text-slate-900 text-sm sm:text-base mt-2">
                        ${p.question}
                      </h4>
                    </div>

                    <div class="space-y-3 pt-2">
                      ${p.options.map(opt => {
                        const ratio = pVotesSum > 0 ? Math.round((opt.votes / pVotesSum) * 100) : 0;
                        return `
                          <div class="space-y-1">
                            <div class="flex justify-between items-center text-xs">
                              <span class="font-sans font-bold text-slate-700">${opt.text}</span>
                              <span class="font-mono font-bold text-slate-450">${opt.votes} votes (${ratio}%)</span>
                            </div>
                            <div class="w-full h-2.5 bg-slate-50 border border-slate-100 rounded-full overflow-hidden relative">
                              <div class="h-full bg-slate-800 rounded-full" style="width: ${ratio}%"></div>
                            </div>
                          </div>
                        `;
                      }).join("")}
                    </div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        `;
      }

      /* =========================================================================
         UTILITIES AND DYNAMIC USER TRIGGERS
         ========================================================================= */

      // UPDATE CREATE/EDIT POLL FIELDS STATS
      function updateFormState(field, val) {
        if (field === 'question') {
          pollFormQuestion = val;
          const pElement = document.getElementById("preview-box-q");
          if (pElement) pElement.innerText = val || "Poll Subject Context...";
        } else if (field === 'category') {
          pollFormCategory = val;
          renderApp(); // Requires fresh preset triggers redecorating entire panels
        } else if (field === 'description') {
          pollFormDescription = val;
          const pDescElement = document.getElementById("preview-box-desc");
          if (pDescElement) pDescElement.innerText = val || "Active instruction layout summary displayed for public users...";
        } else if (field === 'colorPreset') {
          pollFormSelectedColorIdx = val;
          renderApp();
        } else if (field === 'customBg') {
          pollFormCustomBg = val;
          renderApp();
        } else if (field === 'customText') {
          pollFormCustomText = val;
          renderApp();
        }
      }

      function updateOptionField(idx, field, val) {
        if (field === 'votes') {
          pollFormOptions[idx].votes = Math.max(0, parseInt(val) || 0);
        } else {
          pollFormOptions[idx][field] = val;
        }
      }

      function addPollOptionRow() {
        pollFormOptions.push({
          text: "",
          response: "",
          votes: 0
        });
        renderApp();
      }

      function removePollOptionRow(oIdx) {
        if (pollFormOptions.length <= 2) {
          const valBox = document.getElementById("admin-validation-box");
          const valMsg = document.getElementById("admin-validation-box-msg");
          if (valBox && valMsg) {
            valMsg.innerText = "Each poll requires at least two choices to remain valid.";
            valBox.classList.remove("hidden");
          }
          return;
        }
        pollFormOptions = pollFormOptions.filter((_, i) => i !== oIdx);
        renderApp();
      }

      // SUBMIT ENTIRE POLL CONFIG TO THE FILE DATABASE REPLAY
      function savePollSubmit(e) {
        e.preventDefault();
        const valBox = document.getElementById("admin-validation-box");
        const valMsg = document.getElementById("admin-validation-box-msg");
        if (valBox) valBox.classList.add("hidden");

        if (!pollFormQuestion.trim() || !pollFormDescription.trim() || !pollFormCategory.trim()) {
          if (valBox && valMsg) {
            valMsg.innerText = "Please complete all active text boxes.";
            valBox.classList.remove("hidden");
          }
          return;
        }

        const hasEmptyOptions = pollFormOptions.some(o => !o.text.trim() || !o.response.trim());
        if (hasEmptyOptions) {
          if (valBox && valMsg) {
            valMsg.innerText = "All choices require both option text labels and recipient response paths.";
            valBox.classList.remove("hidden");
          }
          return;
        }

        // Color mapping parameters calculation
        let calculatedBg = "";
        let calculatedText = "";
        let calculatedAccent = "";

        if (pollFormSelectedColorIdx !== -1) {
          const preset = COLOR_PRESETS[pollFormSelectedColorIdx];
          calculatedBg = preset.bg;
          calculatedText = preset.text;
        } else {
          calculatedBg = pollFormCustomBg.trim() || "bg-slate-900 border-b-4 border-indigo-500";
          calculatedText = pollFormCustomText.trim() || "text-slate-100";
        }

        // Accent theme colors setup
        if (calculatedBg.includes("indigo")) calculatedAccent = "bg-indigo-600 hover:bg-indigo-700 text-white";
        else if (calculatedBg.includes("emerald")) calculatedAccent = "bg-emerald-600 hover:bg-emerald-700 text-white";
        else if (calculatedBg.includes("rose")) calculatedAccent = "bg-rose-600 hover:bg-rose-700 text-white";
        else if (calculatedBg.includes("violet")) calculatedAccent = "bg-violet-600 hover:bg-violet-700 text-white";
        else if (calculatedBg.includes("amber")) calculatedAccent = "bg-amber-600 hover:bg-amber-705 text-white";
        else calculatedAccent = "bg-slate-800 hover:bg-slate-900 text-white";

        if (isEditingPoll && editingPollId) {
          // Edit state updating
          polls = polls.map(p => {
            if (p.id === editingPollId) {
              return {
                ...p,
                question: pollFormQuestion.trim(),
                description: pollFormDescription.trim(),
                category: pollFormCategory.trim(),
                headingColor: calculatedBg,
                textColor: calculatedText,
                accentColor: calculatedAccent,
                options: pollFormOptions.map((opt, oIdx) => ({
                  id: opt.id || `opt-${editingPollId}-${oIdx}-${Date.now()}`,
                  text: opt.text.trim(),
                  response: opt.response.trim(),
                  votes: opt.votes || 0
                }))
              };
            }
            return p;
          });
        } else {
          // Create new record entity
          const newId = `poll-${Date.now()}`;
          const newEntity = {
            id: newId,
            question: pollFormQuestion.trim(),
            description: pollFormDescription.trim(),
            category: pollFormCategory.trim(),
            headingColor: calculatedBg,
            textColor: calculatedText,
            accentColor: calculatedAccent,
            options: pollFormOptions.map((opt, oIdx) => ({
              id: `opt-${newId}-${oIdx}`,
              text: opt.text.trim(),
              response: opt.response.trim(),
              votes: opt.votes || 0
            }))
          };
          polls = [newEntity, ...polls];
        }

        localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
        cancelPollFormEdit();
        renderApp();
      }

      function startEditPoll(id) {
        const item = polls.find(p => p.id === id);
        if (!item) return;

        isEditingPoll = true;
        editingPollId = id;
        pollFormQuestion = item.question;
        pollFormCategory = item.category;
        pollFormDescription = item.description;

        // Sync solid color preset indices
        const foundIndex = COLOR_PRESETS.findIndex(c => c.bg === item.headingColor);
        if (foundIndex !== -1) {
          pollFormSelectedColorIdx = foundIndex;
          pollFormCustomBg = "";
          pollFormCustomText = "";
        } else {
          pollFormSelectedColorIdx = -1;
          pollFormCustomBg = item.headingColor;
          pollFormCustomText = item.textColor;
        }

        // Dynamic deep copies of choices lists options
        pollFormOptions = item.options.map(o => ({
          id: o.id,
          text: o.text,
          response: o.response,
          votes: o.votes
        }));

        renderApp();
        window.scrollTo({ top: 120, behavior: "smooth" });
      }

      function cancelPollFormEdit() {
        isEditingPoll = false;
        editingPollId = null;
        pollFormQuestion = "";
        pollFormCategory = "Directives";
        pollFormDescription = "";
        pollFormSelectedColorIdx = 0;
        pollFormCustomBg = "";
        pollFormCustomText = "";
        pollFormOptions = [
          { text: "Option A", response: "Excellent choice! You possess the traits of a builder.", votes: 0 },
          { text: "Option B", response: "Intriguing angle. You see opportunities in every challenge.", votes: 0 },
          { text: "Option C", response: "Pragmatic decision. Reliability is your finest quality.", votes: 0 }
        ];
        renderApp();
      }

      function deletePollEntity(id) {
        if (confirm("Are you sure you want to permanently delete this poll entry? This actions sweeps all stored votes.")) {
          polls = polls.filter(p => p.id !== id);
          localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
          if (editingPollId === id) {
            cancelPollFormEdit();
          } else {
            renderApp();
          }
        }
      }

      function resetAllVotesToZero() {
        if (confirm("Are you sure you want to reset ALL votes of every active poll entry back to 0?")) {
          polls = polls.map(p => ({
            ...p,
            options: p.options.map(o => ({ ...o, votes: 0 }))
          }));
          localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
          userVotes = {};
          localStorage.removeItem(STORAGE_USER_VOTES_KEY);
          cancelPollFormEdit();
        }
      }

      // UPDATE SITE BRANDING LOGICS
      function updateSiteState(field, val) {
        if (field === 'brandName') siteFormBrandName = val;
        else if (field === 'brandSub') siteFormBrandSub = val;
        else if (field === 'homeTitle') siteFormHomeTitle = val;
        else if (field === 'homeSubtitle') siteFormHomeSubtitle = val;
        else if (field === 'primaryAccentColor') siteFormPrimaryAccent = val;
        else if (field === 'accentTextColor') siteFormAccentText = val;
        else if (field === 'footerText') siteFormFooterText = val;
      }

      function updateNavItemField(index, field, val) {
        siteFormNavItems[index][field] = val;
      }

      function addNavItemRow() {
        const newRecord = {
          id: `nav-${Date.now()}`,
          label: "New Tab Page",
          path: `/custom-${siteFormNavItems.length}`,
          iconName: "Sparkles",
          badgeText: ""
        };
        siteFormNavItems.push(newRecord);
        renderApp();
      }

      function removeNavItemRow(index) {
        if (siteFormNavItems.length <= 1) {
          const sBox = document.getElementById("site-validation-box");
          const sBoxMsg = document.getElementById("site-validation-box-msg");
          if (sBox && sBoxMsg) {
            sBoxMsg.innerText = "You must have at least one active navigation menu item.";
            sBox.classList.remove("hidden");
          }
          return;
        }
        siteFormNavItems = siteFormNavItems.filter((_, i) => i !== index);
        renderApp();
      }

      function saveSiteSettings(e) {
        e.preventDefault();
        const sBox = document.getElementById("site-validation-box");
        const sBoxMsg = document.getElementById("site-validation-box-msg");
        const successBox = document.getElementById("site-success-box");
        
        if (sBox) sBox.classList.add("hidden");
        if (successBox) successBox.classList.add("hidden");

        if (!siteFormBrandName.trim() || !siteFormHomeTitle.trim() || !siteFormHomeSubtitle.trim()) {
          if (sBox && sBoxMsg) {
            sBoxMsg.innerText = "Brand, Home Title, and Home Description lines are required.";
            sBox.classList.remove("hidden");
          }
          return;
        }

        const hasEmptyNavs = siteFormNavItems.some(n => !n.label.trim() || !n.path.trim());
        if (hasEmptyNavs) {
          if (sBox && sBoxMsg) {
            sBoxMsg.innerText = "All active menu paths require valid text labels.";
            sBox.classList.remove("hidden");
          }
          return;
        }

        siteConfig = {
          brandName: siteFormBrandName.trim(),
          brandSub: siteFormBrandSub.trim(),
          homeTitle: siteFormHomeTitle.trim(),
          homeSubtitle: siteFormHomeSubtitle.trim(),
          primaryAccentColor: siteFormPrimaryAccent.trim() || "bg-indigo-600",
          accentTextColor: siteFormAccentText.trim() || "text-indigo-600",
          footerText: siteFormFooterText.trim() || "A highly-polished feedback app.",
          navItems: siteFormNavItems
        };

        localStorage.setItem(STORAGE_SITE_CONFIG_KEY, JSON.stringify(siteConfig));
        
        if (successBox) {
          successBox.classList.remove("hidden");
          window.scrollTo({ top: 120, behavior: "smooth" });
          setTimeout(() => {
            successBox.classList.add("hidden");
          }, 4000);
        }

        // Immediately update branding styles live
        renderApp();
      }

      // LAUNCH THE PLATFORM
      initAppState();
      renderApp();

    </script>
