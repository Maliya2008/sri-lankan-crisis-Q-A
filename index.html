<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sri Lankan Crisis Q&A — Civic Perspective Hub</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Theme Customizations -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "-apple-system", "sans-serif"],
              mono: ["JetBrains Mono", "ui-monospace", "SFMono-Regular", "monospace"],
            },
          },
        },
      };
    </script>
    
    <!-- Custom styling to prevent flash of unstyled icons / smooth transitions -->
    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#fafafa] flex flex-col font-sans text-slate-800 leading-normal antialiased selection:bg-teal-100 selection:text-teal-900">
    
    <!-- MAIN MOUNT CONTAINER -->
    <div id="app" class="flex flex-col min-h-screen"></div>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Master Single-File JavaScript App -->
    <script>
      // KEY IDENTIFIERS
      const STORAGE_POLLS_KEY = "sl_crisis_polls_data";
      const STORAGE_ADS_KEY = "sl_crisis_ads_data";
      const STORAGE_SITE_CONFIG_KEY = "sl_crisis_site_config";
      const STORAGE_USER_VOTES_KEY = "sl_crisis_user_votes";

      // PRESET COLOR OPTIONS FOR POLLS
      const COLOR_PRESETS = [
        { id: "emerald", bg: "bg-[#064e43] border-b-4 border-emerald-400", text: "text-emerald-50", label: "Ceylon Emerald" },
        { id: "sapphire", bg: "bg-[#0f172a] border-b-4 border-sky-450", text: "text-slate-100", label: "Indian Ocean Sapphire" },
        { id: "ruby", bg: "bg-[#7f1d1d] border-b-4 border-amber-300", text: "text-rose-50", label: "Lankan Amber Ruby" },
        { id: "bark", bg: "bg-[#7c2d12] border-b-4 border-yellow-400", text: "text-orange-50", label: "Cinnamon Bark Spice" },
        { id: "midnight", bg: "bg-zinc-900 border-b-4 border-teal-500", text: "text-zinc-100", label: "Midnight Coal" }
      ];

      // DEFAULT SITE CONFIG (DYNAMICALLY CHANGEABLE IN ADMIN)
      const DEFAULT_SITE_CONFIG = {
        brandName: "LankaCrisis Q&A",
        brandSub: "Civic Consensus Engine",
        homeTitle: "Sri Lankan Economic Recovery & Policy Outlook",
        homeSubtitle: "Vote across structured policy surveys, express civic perspectives, and examine key recovery insights on tourism, agriculture, and monetary stabilization. Your input shapes collaborative reform feedback.",
        footerText: "A non-partisan civic platform for tracking consensus and recovery solutions. Created for transparent policy education.",
        primaryAccentColor: "bg-[#064e43]",
        accentTextColor: "text-[#064e43]",
        navItems: [
          { id: "nav-polls", label: "Live Q&A Surveys", path: "/", iconName: "Vote" },
          { id: "nav-stats", label: "Collective Stats", path: "/stats", iconName: "BarChart3" }
        ]
      };

      // INITIAL SURVIVING DATA - EMPOWERED BY TOPICS EXCLUSIVELY COVERING SRI LANKAN ECONOMIC REALITY
      const INITIAL_POLLS = [
        {
          id: "poll-recovery-causes",
          question: "Primary catalyst of the 2022 macroeconomic balance-of-payments crisis?",
          description: "Select the policy pivot you evaluate was most central in initiating foreign reserve exhaustions.",
          category: "Macroeconomics",
          headingColor: "bg-[#064e43] border-b-4 border-emerald-400",
          textColor: "text-emerald-50",
          accentColor: "bg-[#064e43] hover:bg-[#043d34] text-white",
          options: [
            { id: "opt-causes-1", text: "Organic Agriculture Reform (Sudden Fertilizer Ban)", votes: 642, response: "Key point. The rapid restriction of agricultural inputs triggered immediate crop yield reductions in tea & rice, boosting import dependence." },
            { id: "opt-causes-2", text: "Aggressive Tax Cuts (Unhedged 2019 Fiscal Reductions)", votes: 890, response: "Critical consensus. The immediate slashing of VAT rates dried out public treasury revenue streams, forcing rating downgrades and debt defaults." },
            { id: "opt-causes-3", text: "Loss of Tourism Inflows & Sovereign Debt Amortizations", votes: 412, response: "Accurate insight. Parallel tourism freezes during 2020 left Sri Lanka without crucial reserve buffers to service heavy sovereign maturities." }
          ]
        },
        {
          id: "poll-stabilization-priorities",
          question: "Which sector holds the highest potential for clean foreign exchange inflows?",
          description: "Analyze where capital injections and investment incentives should land to optimize domestic stabilization.",
          category: "Stabilization",
          headingColor: "bg-[#0f172a] border-b-4 border-sky-450",
          textColor: "text-slate-100",
          accentColor: "bg-slate-900 hover:bg-slate-850 text-white",
          options: [
            { id: "opt-sect-1", text: "Global IT Services, Software Exports & Freelancer Channels", votes: 310, response: "Excellent priority. Leveraging the highly-skilled local software engineering workforce creates steady service inflows requiring no bulk resource imports." },
            { id: "opt-sect-2", text: "Eco-Adventure Tourism & Sustainable Port Logistics Complexes", votes: 485, response: "Strong historical factor. Re-invigorating niche tourism corridors drives high retail revenue and supports small entrepreneurs." },
            { id: "opt-sect-3", text: "Value-Added Ceylon Tea, Spices & High-Strength Textiles", votes: 245, response: "Traditional asset. Reforming manufacturing logistics to foster higher yield exports expands long-term agricultural sustainability." }
          ]
        },
        {
          id: "poll-social-reforms",
          question: "What is the most pressing social safeguard reform for rural populations?",
          description: "Prioritize state safety nets required to shield families during structural economic alignments.",
          category: "Social Safety",
          headingColor: "bg-[#7c2d12] border-b-4 border-yellow-400",
          textColor: "text-orange-50",
          accentColor: "bg-amber-850 hover:bg-amber-900 text-white",
          options: [
            { id: "opt-saf-1", text: "Expanding Direct, Audited Welfare Transfers (Samurdhi/Aswesuma Reforms)", votes: 512, response: "Vital strategy. Deploying transparent targeting algorithms ensures support meets truly vulnerable families without local corruption." },
            { id: "opt-saf-2", text: "Subsidized Domestic Farming Inputs & Solar Power Integration", votes: 388, response: "Practical focus. Safeguarding organic-synthetic fertilizer mixes and local micro-grids shields producers from imported power fluctuations." },
            { id: "opt-saf-3", text: "School Food Programs & Basic Medical Supply Security", votes: 476, response: "Direct target. Guaranteeing free diagnostic access and child nutrition preserves human capital throughout macro adjustments." }
          ]
        }
      ];

      // INITIAL DECORATIVE ADS TO MATCH THE TOURISM & AID THEMATIC FOCUS FOR SRI LANKA
      const INITIAL_ADS = [
        {
          id: "ad-lanka-tourism",
          title: "Visit Sri Lanka: Travel to Support Local Communities",
          description: "Explore gold sand coasts, deep wildlife sanctuaries, and ancient highland temples. Your visit directly employs local guides, independent hoteliers, and creative craftspeople working towards economic revitalization.",
          imageUrl: "https://images.unsplash.com/photo-1546708973-b339540b5162?w=600&auto=format&fit=crop&q=80",
          linkUrl: "https://www.srilanka.travel",
          badgeText: "Revitalization Initiative",
          position: "Top Banner", // "Top Banner" or "In-Feed"
          buttonText: "Plan Your Eco-Trip",
          isActive: true
        },
        {
          id: "ad-red-cross-aid",
          title: "Support Sri Lanka Child Nutrition Campaigns",
          description: "Provide medical kits, dry food rations, and school notebooks to children in remote rural dry-zones. Help local response teams secure child welfare and health safety nets in critical provinces.",
          imageUrl: "https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?w=600&auto=format&fit=crop&q=80",
          linkUrl: "https://www.unicef.org/srilanka",
          badgeText: "Emergency Relief Appeal",
          position: "In-Feed",
          buttonText: "Sponsor Nutrition Packs",
          isActive: true
        }
      ];

      // CORE APPLICATION STATE
      let polls = [];
      let ads = [];
      let siteConfig = {};
      let userVotes = {};
      let currentRoute = "/"; // "/" represents Polls list, "/stats" represents Stats view, "/admin" is Admin console

      // ADMIN PORTAL & SECURITY VARIABLES
      let isAdminAuthenticated = sessionStorage.getItem("admin_logged_in") === "true";
      let adminLoginEmail = "";
      let adminLoginPassword = "";
      let adminLoginErrorMsg = "";

      // ACTIVE ADMIN UI SUB-TAB
      let activeAdminTab = "polls"; // "polls", "ads", "site"

      // FORM TEMPORARY STATE: POLL EDITOR
      let isEditingPoll = false;
      let editingPollId = null;
      let pollFormQuestion = "";
      let pollFormCategory = "Macroeconomics";
      let pollFormDescription = "";
      let pollFormSelectedColorIdx = 0; // index in COLOR_PRESETS, -1 for custom
      let pollFormCustomBg = "";
      let pollFormCustomText = "";
      let pollFormOptions = [
        { text: "Option A", response: "Excellent analysis on stabilization guidelines.", votes: 0 },
        { text: "Option B", response: "Very sensible approach to public accountability.", votes: 0 },
        { text: "Option C", response: "Plausible reform pathway. Reliability remains paramount.", votes: 0 }
      ];

      // FORM TEMPORARY STATE: AD EDITOR
      let isEditingAd = false;
      let editingAdId = null;
      let adFormTitle = "";
      let adFormDescription = "";
      let adFormImageUrl = "";
      let adFormLinkUrl = "";
      let adFormBadgeText = "Sponsored Announcement";
      let adFormPosition = "In-Feed"; // "Top Banner", "In-Feed"
      let adFormButtonText = "Learn More";
      let adFormIsActive = true;

      // FORM TEMPORARY STATE: SITE DESIGN
      let siteFormBrandName = "";
      let siteFormBrandSub = "";
      let siteFormHomeTitle = "";
      let siteFormHomeSubtitle = "";
      let siteFormPrimaryAccent = "";
      let siteFormAccentText = "";
      let siteFormFooterText = "";
      let siteFormNavItems = [];

      // DYNAMIC GITHUB PAGES & STANDARD ROUTE RESOLUTION
      function determineCurrentRoute() {
        const path = window.location.pathname.toLowerCase();
        const hash = window.location.hash.toLowerCase();
        const search = window.location.search.toLowerCase();

        // Check for admin page matches
        if (path.endsWith('/admin') || hash === '#admin' || hash === '#/admin' || search.includes('page=admin')) {
          return "/admin";
        }
        // Check for stats page matches
        if (path.endsWith('/stats') || hash === '#stats' || hash === '#/stats' || search.includes('page=stats')) {
          return "/stats";
        }
        // Fallback to home/surveys page
        return "/";
      }

      // NAV ROUTER
      function routeTo(path) {
        // To be 100% compatible with GitHub Pages without throwing 404, we support hash-like indicators
        if (path === '/') {
          window.location.hash = "";
          currentRoute = "/";
        } else if (path === '/stats') {
          window.location.hash = "stats";
          currentRoute = "/stats";
        } else if (path === '/admin') {
          window.location.hash = "admin";
          currentRoute = "/admin";
        } else {
          window.location.hash = path.replace('/', '');
          currentRoute = path;
        }
        window.scrollTo({ top: 0, behavior: "smooth" });
        renderApp();
      }

      // STATE LOAD ENGINE
      function initAppState() {
        try {
          // Polls list synchronization
          const storedPolls = localStorage.getItem(STORAGE_POLLS_KEY);
          if (storedPolls) {
            polls = JSON.parse(storedPolls);
          } else {
            polls = INITIAL_POLLS;
            localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(INITIAL_POLLS));
          }

          // Ads list synchronization
          const storedAds = localStorage.getItem(STORAGE_ADS_KEY);
          if (storedAds) {
            ads = JSON.parse(storedAds);
          } else {
            ads = INITIAL_ADS;
            localStorage.setItem(STORAGE_ADS_KEY, JSON.stringify(INITIAL_ADS));
          }

          // Site config synchronization
          const storedConfig = localStorage.getItem(STORAGE_SITE_CONFIG_KEY);
          if (storedConfig) {
            siteConfig = JSON.parse(storedConfig);
          } else {
            siteConfig = DEFAULT_SITE_CONFIG;
            localStorage.setItem(STORAGE_SITE_CONFIG_KEY, JSON.stringify(DEFAULT_SITE_CONFIG));
          }

          // Stored votes matching tracker
          const storedVotes = localStorage.getItem(STORAGE_USER_VOTES_KEY);
          userVotes = storedVotes ? JSON.parse(storedVotes) : {};

          // Sync variables to corresponding form fields
          syncAdminFormFields();
          
          // Detect route from original window coordinates
          currentRoute = determineCurrentRoute();
        } catch (e) {
          console.error("State crash on system parameters, soft resetting safely...", e);
          polls = INITIAL_POLLS;
          ads = INITIAL_ADS;
          siteConfig = DEFAULT_SITE_CONFIG;
          userVotes = {};
          syncAdminFormFields();
          currentRoute = "/";
        }
      }

      function syncAdminFormFields() {
        // Site Identity mapping
        siteFormBrandName = siteConfig.brandName || "LankaCrisis Q&A";
        siteFormBrandSub = siteConfig.brandSub || "Perspective Platform";
        siteFormHomeTitle = siteConfig.homeTitle || "Sri Lankan Economic Recovery";
        siteFormHomeSubtitle = siteConfig.homeSubtitle || "Perspective survey platform.";
        siteFormPrimaryAccent = siteConfig.primaryAccentColor || "bg-[#064e43]";
        siteFormAccentText = siteConfig.accentTextColor || "text-[#064e43]";
        siteFormFooterText = siteConfig.footerText || "A transparent platform for civic perspectives.";
        siteFormNavItems = JSON.parse(JSON.stringify(siteConfig.navItems || []));

        // Poll Creation temporary buffers Reset
        pollFormQuestion = "";
        pollFormCategory = "Macroeconomics";
        pollFormDescription = "";
        pollFormSelectedColorIdx = 0;
        pollFormCustomBg = "";
        pollFormCustomText = "";
        pollFormOptions = [
          { text: "Option A", response: "Excellent recovery prioritization analysis.", votes: 0 },
          { text: "Option B", response: "Sensible approach regarding domestic fiscal reforms.", votes: 0 },
          { text: "Option C", response: "Pragmatic consensus. Rebuilding institutions remains key.", votes: 0 }
        ];

        // Ad Creation temporary buffers Reset
        adFormTitle = "";
        adFormDescription = "";
        adFormImageUrl = "";
        adFormLinkUrl = "";
        adFormBadgeText = "Sponsored Campaign";
        adFormPosition = "In-Feed";
        adFormButtonText = "Learn More";
        adFormIsActive = true;
      }

      // ROUTING COMPATIBILITY CHECKS
      window.addEventListener("popstate", () => {
        currentRoute = determineCurrentRoute();
        renderApp();
      });
      window.addEventListener("hashchange", () => {
        currentRoute = determineCurrentRoute();
        renderApp();
      });

      // CORE USER VOTE EMISSION ACTIONS
      function castVote(pollId, optionId) {
        polls = polls.map(p => {
          if (p.id === pollId) {
            return {
              ...p,
              options: p.options.map(opt => {
                if (opt.id === optionId) {
                  return { ...opt, votes: opt.votes + 1 };
                }
                return opt;
              })
            };
          }
          return p;
        });

        userVotes[pollId] = optionId;
        localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
        localStorage.setItem(STORAGE_USER_VOTES_KEY, JSON.stringify(userVotes));
        renderApp();
      }

      function retractVote(pollId) {
        const previousVoteId = userVotes[pollId];
        if (!previousVoteId) return;

        polls = polls.map(p => {
          if (p.id === pollId) {
            return {
              ...p,
              options: p.options.map(opt => {
                if (opt.id === previousVoteId) {
                  return { ...opt, votes: Math.max(0, opt.votes - 1) };
                }
                return opt;
              })
            };
          }
          return p;
        });

        delete userVotes[pollId];
        localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
        localStorage.setItem(STORAGE_USER_VOTES_KEY, JSON.stringify(userVotes));
        renderApp();
      }

      // HELPER: Convert Name to clean lucide icon keyword format
      function parseIconString(name) {
        if (!name) return "help-circle";
        return name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').replace(/\s+/g, '-').toLowerCase();
      }

      // MAIN RENDER ENGINE
      function renderApp() {
        const appContainer = document.getElementById("app");
        if (!appContainer) return;

        // Determine if we are rendered inside the admin route
        const showingAdminView = currentRoute === "/admin";

        // Filter valid site config nav items.
        // We explicitly omit the admin link from the public frontend navigation
        const publicNavItems = (siteConfig.navItems || []).filter(item => item.path !== "/admin");

        // RENDER HEADER MODULE
        let headerHTML = `
          <nav id="app-navigation" class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-slate-100 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div class="flex items-center justify-between h-16">
                
                <!-- Brand logo area -->
                <div onclick="routeTo('/')" class="flex items-center gap-3 cursor-pointer group">
                  <div class="w-10 h-10 rounded-xl ${siteConfig.primaryAccentColor || 'bg-teal-900'} flex items-center justify-center text-white transition-transform group-hover:scale-105 duration-250 shadow-sm">
                    <i data-lucide="vote" class="w-5.5 h-5.5"></i>
                  </div>
                  <div>
                    <span class="font-sans font-extrabold text-slate-900 block text-base md:text-lg tracking-tight leading-tight">
                      ${siteConfig.brandName}
                    </span>
                    <span class="font-mono text-[9px] text-slate-400 block font-bold uppercase tracking-wider">
                      ${siteConfig.brandSub}
                    </span>
                  </div>
                </div>

                <!-- Desktop links -->
                <div class="hidden md:flex items-center gap-1.5">
                  ${publicNavItems.map(item => {
                    const isActive = currentRoute === item.path;
                    const resolvedIcon = parseIconString(item.iconName);
                    return `
                      <button 
                        onclick="routeTo('${item.path}')"
                        class="flex items-center gap-2 px-4 py-2.5 rounded-xl text-xs font-semibold transition-all ${
                          isActive 
                            ? `${siteConfig.accentTextColor || 'text-teal-800'} bg-teal-50/70 font-bold` 
                            : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                        }"
                      >
                        <i data-lucide="${resolvedIcon}" class="w-4 h-4"></i>
                        <span>${item.label}</span>
                        ${item.badgeText ? `
                          <span class="inline-flex items-center px-1.5 py-0.2 rounded-full text-[8px] font-extrabold bg-teal-600 text-white uppercase tracking-wider">
                            ${item.badgeText}
                          </span>
                        ` : ''}
                      </button>
                    `;
                  }).join("")}

                  ${isAdminAuthenticated ? `
                    <div class="h-4 w-px bg-slate-200 mx-2"></div>
                    <button 
                      onclick="routeTo('/admin')"
                      class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold bg-amber-50 text-amber-800 border border-amber-250/50"
                    >
                      <i data-lucide="shield" class="w-3.5 h-3.5"></i>
                      <span>Console Active</span>
                    </button>
                  ` : ''}
                </div>

                <!-- Handheld burger icon toggler -->
                <div class="md:hidden">
                  <button onclick="toggleHandheldMenu()" class="p-2 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 transition-colors" id="burger-button">
                    <i data-lucide="menu" class="w-5.5 h-5.5" id="burger-toggle-icon"></i>
                  </button>
                </div>

              </div>
            </div>

            <!-- Handheld Mobile Drawer block -->
            <div id="mobile-menu-drawer" class="hidden md:hidden border-t border-slate-100 bg-white">
              <div class="px-4 py-4 space-y-2">
                ${publicNavItems.map(item => {
                  const isActive = currentRoute === item.path;
                  const resolvedIcon = parseIconString(item.iconName);
                  return `
                    <button 
                      onclick="toggleHandheldMenu(); routeTo('${item.path}')"
                      class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-left text-xs font-bold transition-all ${
                        isActive 
                          ? 'bg-slate-900 text-white' 
                          : 'text-slate-600 hover:bg-slate-50'
                      }"
                    >
                      <div class="flex items-center gap-3">
                        <i data-lucide="${resolvedIcon}" class="w-4.5 h-4.5"></i>
                        <span>${item.label}</span>
                      </div>
                      ${item.badgeText ? `
                        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[8px] font-bold uppercase tracking-widest ${
                          isActive ? 'bg-white/20 text-white' : 'bg-teal-50 text-teal-700'
                        }">
                          ${item.badgeText}
                        </span>
                      ` : ''}
                    </button>
                  `;
                }).join("")}

                ${isAdminAuthenticated ? `
                  <button 
                    onclick="toggleHandheldMenu(); routeTo('/admin')"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-xs font-bold bg-amber-50 text-amber-800 border border-amber-200"
                  >
                    <i data-lucide="shield" class="w-4.5 h-4.5"></i>
                    <span>Authorized Console</span>
                  </button>
                ` : ''}
              </div>
            </div>
          </nav>
        `;

        // ADVERTISING INTEGRATION: TOP POSITION BANNER ADS
        // Check for active "Top Banner" ads to inject seamlessly right below navbar
        const activeTopAd = ads.find(a => a.isActive && a.position === "Top Banner");
        let topAdBannerHTML = "";
        if (activeTopAd && !showingAdminView) {
          topAdBannerHTML = `
            <div id="top-promotion-banner" class="bg-gradient-to-r from-slate-900 via-teal-980 to-slate-900 text-slate-100 border-b border-teal-800 relative select-none shrink-0">
              <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4.5 flex flex-col md:flex-row items-center justify-between gap-4 animate-fade-in">
                
                <!-- Ad Left visual & details info -->
                <div class="flex flex-col sm:flex-row items-center gap-4 text-center sm:text-left">
                  ${activeTopAd.imageUrl ? `
                    <img 
                      src="${activeTopAd.imageUrl}" 
                      alt="Banner promotion image" 
                      class="w-16 h-12 rounded-lg object-cover border border-white/10 shrink-0 shadow-sm"
                      referrerpolicy="no-referrer"
                    />
                  ` : `
                    <div class="w-16 h-12 bg-white/10 rounded-lg flex items-center justify-center shrink-0 border border-white/5">
                      <i data-lucide="sparkles" class="w-5 h-5 text-amber-300"></i>
                    </div>
                  `}
                  <div class="min-w-0">
                    <span class="inline-flex px-1.5 py-0.2 rounded text-[8px] font-black uppercase tracking-widest bg-emerald-500 text-white leading-none align-middle mr-2">
                      ${activeTopAd.badgeText || "PATRON CONTENT"}
                    </span>
                    <h5 class="inline font-sans font-bold text-sm text-white">
                      ${activeTopAd.title}
                    </h5>
                    <p class="font-sans text-xs text-slate-300 mt-1 max-w-2xl leading-relaxed">
                      ${activeTopAd.description}
                    </p>
                  </div>
                </div>

                <!-- Ad CTA button -->
                <div class="flex items-center gap-3 shrink-0">
                  <a 
                    href="${activeTopAd.linkUrl}" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-xs font-bold text-white rounded-lg transition-transform hover:scale-[1.02] shadow-sm flex items-center gap-1.5"
                  >
                    <span>${activeTopAd.buttonText || "Explore Link"}</span>
                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                  </a>
                  <button 
                    onclick="dismissTopAdBanner()"

      /* =========================================================================
         AUTHORIZED BACKSTAGE CALCULATOR HANDLERS & BUFFER UPDATE ROUTINES

      // POLLS MUTATOR HANDLERS
      function updatePollFormState(field, value) {
        if (field === 'question') {
          pollFormQuestion = value;
          const label = document.getElementById("poll-input-q");
          if (label) label.value = value;
        } else if (field === 'category') {
          pollFormCategory = value;
        } else if (field === 'description') {
          pollFormDescription = value;
        } else if (field === 'colorPreset') {
          pollFormSelectedColorIdx = value;
        } else if (field === 'customBg') {
          pollFormCustomBg = value;
        } else if (field === 'customText') {
          pollFormCustomText = value;
        }
        renderApp();
      }

      function updateOptionValue(index, property, value) {
        if (property === 'votes') {
          pollFormOptions[index].votes = Math.max(0, parseInt(value) || 0);
        } else {
          pollFormOptions[index][property] = value;
        }
      }

      function addPollOptionFormRow() {
        pollFormOptions.push({
          text: "",
          response: "",
          votes: 0
        });
        renderApp();
      }

      function removePollOptionFormRow(index) {
        pollFormOptions = pollFormOptions.filter((_, i) => i !== index);
        renderApp();
      }

      function savePollEntity(e) {
        e.preventDefault();
        const warnBox = document.getElementById("polls-warning-box");
        const warnText = document.getElementById("polls-warning-box-text");
        if (warnBox) warnBox.classList.add("hidden");

        // Validate basic criteria checks
        if (!pollFormQuestion.trim() || !pollFormCategory.trim() || !pollFormDescription.trim()) {
          if (warnBox && warnText) {
            warnText.innerText = "Please complete all active text boxes before submitting.";
            warnBox.classList.remove("hidden");
          }
          return;
        }

        const missingAnswers = pollFormOptions.some(opt => !opt.text.trim() || !opt.response.trim());
        if (missingAnswers) {
          if (warnBox && warnText) {
            warnText.innerText = "All choice options require both active option text labels and custom response insights.";
            warnBox.classList.remove("hidden");
          }
          return;
        }

        // Color mapping resolve
        let solvedBg = "";
        let solvedText = "";
        if (pollFormSelectedColorIdx !== -1) {
          const preset = COLOR_PRESETS[pollFormSelectedColorIdx];
          solvedBg = preset.bg;
          solvedText = preset.text;
        } else {
          solvedBg = pollFormCustomBg.trim() || "bg-slate-900 border-b-4 border-emerald-400";
          solvedText = pollFormCustomText.trim() || "text-slate-100";
        }

        let solvedAccent = "";
        if (solvedBg.includes("emerald") || solvedBg.includes("#064e43")) {
          solvedAccent = "bg-[#064e43] hover:bg-[#043d34] text-white";
        } else if (solvedBg.includes("slate") || solvedBg.includes("sapphire") || solvedBg.includes("zinc")) {
          solvedAccent = "bg-slate-900 hover:bg-slate-850 text-white";
        } else if (solvedBg.includes("ruby") || solvedBg.includes("red") || solvedBg.includes("rose")) {
          solvedAccent = "bg-rose-900 hover:bg-rose-955 text-white";
        } else {
          solvedAccent = "bg-teal-900 hover:bg-teal-950 text-white";
        }

        if (isEditingPoll && editingPollId) {
          // Perform record override update
          polls = polls.map(p => {
            if (p.id === editingPollId) {
              return {
                ...p,
                question: pollFormQuestion.trim(),
                description: pollFormDescription.trim(),
                category: pollFormCategory.trim(),
                headingColor: solvedBg,
                textColor: solvedText,
                accentColor: solvedAccent,
                options: pollFormOptions.map((o, idx) => ({
                  id: o.id || `opt-${Date.now()}-${idx}`,
                  text: o.text.trim(),
                  response: o.response.trim(),
                  votes: o.votes || 0
                }))
              };
            }
            return p;
          });
        } else {
          // Initialize fresh new record entry parameters
          const freshId = `poll-${Date.now()}`;
          const freshEntity = {
            id: freshId,
            question: pollFormQuestion.trim(),
            description: pollFormDescription.trim(),
            category: pollFormCategory.trim(),
            headingColor: solvedBg,
            textColor: solvedText,
            accentColor: solvedAccent,
            options: pollFormOptions.map((o, idx) => ({
              id: `opt-${freshId}-${idx}`,
              text: o.text.trim(),
              response: o.response.trim(),
              votes: o.votes || 0
            }))
          };
          polls = [freshEntity, ...polls];
        }

        localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
        resetPollFormBuffers();
        renderApp();
      }

      function triggerEditPoll(id) {
        const matchingRecord = polls.find(p => p.id === id);
        if (!matchingRecord) return;

        isEditingPoll = true;
        editingPollId = id;
        pollFormQuestion = matchingRecord.question;
        pollFormCategory = matchingRecord.category;
        pollFormDescription = matchingRecord.description;

        const presetIdx = COLOR_PRESETS.findIndex(c => c.bg === matchingRecord.headingColor);
        if (presetIdx !== -1) {
          pollFormSelectedColorIdx = presetIdx;
          pollFormCustomBg = "";
          pollFormCustomText = "";
        } else {
          pollFormSelectedColorIdx = -1;
          pollFormCustomBg = matchingRecord.headingColor;
          pollFormCustomText = matchingRecord.textColor;
        }

        pollFormOptions = matchingRecord.options.map(o => ({
          id: o.id,
          text: o.text,
          response: o.response,
          votes: o.votes
        }));

        renderApp();
        window.scrollTo({ top: 120, behavior: "smooth" });
      }

      function resetPollFormBuffers() {
        isEditingPoll = false;
        editingPollId = null;
        pollFormQuestion = "";
        pollFormCategory = "Macroeconomics";
        pollFormDescription = "";
        pollFormSelectedColorIdx = 0;
        pollFormCustomBg = "";
        pollFormCustomText = "";
        pollFormOptions = [
          { text: "Option A", response: "Excellent analysis on stabilization guidelines.", votes: 0 },
          { text: "Option B", response: "Very sensible approach to public accountability.", votes: 0 },
          { text: "Option C", response: "Plausible reform pathway. Reliability remains paramount.", votes: 0 }
        ];
        renderApp();
      }

      function deletePollRecord(id) {
        if (confirm("Are you sure you want to permanently delete this poll? All user accumulated sample votes will be dropped.")) {
          polls = polls.filter(p => p.id !== id);
          localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
          if (editingPollId === id) {
            resetPollFormBuffers();
          } else {
            renderApp();
          }
        }
      }

      function resetAllSurveyVotes() {
        if (confirm("Are you sure you want to reset all survey accumulated votes indicators back to 0? This sweeps your civic telemetry database clean.")) {
          polls = polls.map(p => ({
            ...p,
            options: p.options.map(o => ({ ...o, votes: 0 }))
          }));
          localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
          userVotes = {};
          localStorage.removeItem(STORAGE_USER_VOTES_KEY);
          resetPollFormBuffers();
        }
      }


      // DYNAMIC SPONSOR/ADS MUTATOR HANDLERS
      function saveAdCampaign(e) {
        e.preventDefault();
        
        if (!adFormTitle.trim() || !adFormDescription.trim() || !adFormLinkUrl.trim()) {
          alert("All campaign parameters require complete text descriptors.");

        if (isEditingAd && editingAdId) {

          ads = ads.map(a => {
            if (a.id === editingAdId) {
              return {
                ...a,
                title: adFormTitle.trim(),
                description: adFormDescription.trim(),
                imageUrl: adFormImageUrl.trim(),
                linkUrl: adFormLinkUrl.trim(),

                position: adFormPosition,
                buttonText: adFormButtonText.trim() || "Learn More",
                isActive: adFormIsActive
              };
            }
            return a;

          const recordId = `ad-${Date.now()}`;
          const newAd = {
            id: recordId,
            title: adFormTitle.trim(),
            description: adFormDescription.trim(),
            imageUrl: adFormImageUrl.trim(),
            linkUrl: adFormLinkUrl.trim(),

            buttonText: adFormButtonText.trim() || "Learn More",
            isActive: adFormIsActive

          ads = [newAd, ...ads];

        localStorage.setItem(STORAGE_ADS_KEY, JSON.stringify(ads));
        resetAdFormBuffers();
        renderApp();

      function triggerEditAd(id) {

        isEditingAd = true;

      function resetAdFormBuffers() {
        isEditingAd = false;
        editingAdId = null;
        adFormTitle = "";
        adFormDescription = "";
        adFormImageUrl = "";

        adFormBadgeText = "Sponsored Campaign";

      function deleteAdCampaignRecord(id) {
        if (confirm("Are you sure you want to drop this promotional ad campaign? It will disappear from all user frames immediately.")) {
          ads = ads.filter(a => a.id !== id);

      function toggleAdActiveState(id) {
        ads = ads.map(a => {
          if (a.id === id) {
            return { ...a, isActive: !a.isActive };

          return a;
        });
        localStorage.setItem(STORAGE_ADS_KEY, JSON.stringify(ads));
        renderApp();
      }


      // BRAND IDENTITY BRANDING CONFIG SAVING
      function updateDynamicNavItemProperty(index, property, value) {
        siteFormNavItems[index][property] = value;
      }

      function addDynamicNavItemRow() {
        siteFormNavItems.push({
          id: `nav-${Date.now()}`,
          label: "Consensus Forum",
          path: `/custom-${siteFormNavItems.length}`,
          iconName: "HelpCircle",
          badgeText: ""
        });
        renderApp();
      }

      function removeDynamicNavItemRow(index) {
        if (siteFormNavItems.length <= 1) {
          alert("You require at least one active navigation item target link.");
          return;
        }
        siteFormNavItems = siteFormNavItems.filter((_, idx) => idx !== index);
        renderApp();
      }

      function saveSiteBrandingConfigs(e) {
        e.preventDefault();
        
        const successAlet = document.getElementById("site-success-alert-box");
        if (successAlet) successAlet.classList.add("hidden");

        if (!siteFormBrandName.trim() || !siteFormHomeTitle.trim() || !siteFormHomeSubtitle.trim()) {
          alert("Fields matching brand logo, headline title, and descript intro are strictly required.");
          return;
        }

        const emptyPaths = siteFormNavItems.some(n => !n.label.trim() || !n.path.trim());
        if (emptyPaths) {
          alert("Each active menu link requires an unambiguous label and routing key target path.");
          return;
        }

        // commit configurations state sync
        siteConfig = {
          brandName: siteFormBrandName.trim(),
          brandSub: siteFormBrandSub.trim(),
          homeTitle: siteFormHomeTitle.trim(),
          homeSubtitle: siteFormHomeSubtitle.trim(),
          primaryAccentColor: siteFormPrimaryAccent.trim() || "bg-[#064e43]",
          accentTextColor: siteFormAccentText.trim() || "text-[#064e43]",
          footerText: siteFormFooterText.trim() || "A transparent platform for civic perspectives.",
          navItems: siteFormNavItems
        };

        localStorage.setItem(STORAGE_SITE_CONFIG_KEY, JSON.stringify(siteConfig));
        
        if (successAlet) {
          successAlet.classList.remove("hidden");
          window.scrollTo({ top: 120, behavior: "smooth" });
          setTimeout(() => {
            successAlet.classList.add("hidden");
          }, 3500);
        }

        renderApp();
      }

      // LAUNCH THE CIVIC PERSPECTIVE ENGINE
      initAppState();
      renderApp();

    </script>
  </body>
</html>
