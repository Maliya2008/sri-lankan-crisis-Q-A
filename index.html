    <!-- Premium Google Fonts -->

    <!-- Tailwind Configurations -->

    </script>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
      
      @theme {

        --font-display: "Space Grotesk", sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;

      .animate-fade-in {

      }

      }

        border-radius: 9999px;

    <!-- Lucide Icons Library -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK Config & App Logic -->
    <script type="module">

      import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      // === FIREBASE DATABASE CONNECTION ===
      const firebaseConfig = {
        projectId: "gen-lang-client-0620780356",
        appId: "1:163118363221:web:0582c29e14d4265e8b9adc",
        apiKey: "AIzaSyBWuLG5r8U7-Fc9ZBO9_fcJFgJtN2Y8fRo",
        authDomain: "gen-lang-client-0620780356.firebaseapp.com",
        firestoreDatabaseId: "ai-studio-e839c2b6-1528-479c-af46-38f6f4c910b7",
        storageBucket: "gen-lang-client-0620780356.firebasestorage.app",
        messagingSenderId: "163118363221"
      };

      let db = null;
      try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
        console.log("Firebase initialized successfully on target DB:", firebaseConfig.firestoreDatabaseId);
      } catch (err) {
        console.error("Firebase startup issues:", err);
      }

      // === LOCAL APP PERSISTENCE AND STATE KEYS ===
      const STORAGE_POLLS_KEY = "lanka_crisis_polls_v2";
      const STORAGE_SITE_CONFIG_KEY = "lanka_crisis_config_v2";
      const STORAGE_USER_VOTES_KEY = "lanka_crisis_votes_v2";

      // === DEFAULT SEED DATA ===
      const DEFAULT_SITE_CONFIG = {
        brandName: "LankaCrisis Q&A",
        brandSub: "Civic Consensus Engine",
        homeTitle: "Sri Lankan Economic Recovery & Policy Outlook",
        homeSubtitle: "Explore structured policy surveys, cast your civic choices, and inspect key recovery strategies spanning agriculture, energy, and financial restructuring. Your response fuels collaborative reform insights.",
        footerText: "A non-partisan civic platform for tracking consensus and recovery solutions. Built for transparent policy awareness.",
        adRedirectUrl: "https://google.com/"
      };

      const DEFAULT_POLLS = [
        {
          id: "poll-recovery-causes",
          question: "Primary catalyst of the 2022 macroeconomic balance-of-payments crisis?",
          description: "Select the policy pivot you evaluate was most central in initiating foreign reserve exhaustions.",
          category: "Macroeconomics",
          colorTheme: "emerald", // Theme accents
          options: [
            { id: "opt-causes-1", text: "Organic Agriculture Reform (Sudden Fertilizer Ban)", votes: 642, response: "Key point. The rapid restriction of agricultural inputs triggered immediate crop yield reductions in tea & rice, boosting import dependence." },
            { id: "opt-causes-2", text: "Aggressive Tax Cuts (Unhedged 2019 Fiscal Reductions)", votes: 890, response: "Critical consensus. The immediate slashing of VAT rates dried out public treasury revenue streams, forcing rating downgrades and debt defaults." },
            { id: "opt-causes-3", text: "Loss of Tourism Inflows & Sovereign Debt Amortizations", votes: 412, response: "Accurate insight. Parallel tourism freezes during 2020 left Sri Lanka without crucial reserve buffers to service heavy sovereign maturities." }
          ]
        },
        {
          id: "poll-stabilization-priorities",
          question: "Which sector holds the highest potential for clean foreign exchange inflows?",
          description: "Analyze where capital injections and investment incentives should land to optimize domestic stabilization.",
          category: "Stabilization",
          colorTheme: "sky",
          options: [
            { id: "opt-sect-1", text: "Global IT Services, Software Exports & Freelancer Channels", votes: 310, response: "Excellent priority. Leveraging the highly-skilled local software engineering workforce creates steady service inflows requiring no bulk resource imports." },
            { id: "opt-sect-2", text: "Eco-Adventure Tourism & Sustainable Port Logistics Complexes", votes: 485, response: "Strong historical factor. Re-invigorating niche tourism corridors drives high retail revenue and supports small entrepreneurs." },
            { id: "opt-sect-3", text: "Value-Added Ceylon Tea, Spices & High-Strength Textiles", votes: 245, response: "Traditional asset. Reforming manufacturing logistics to foster higher yield exports expands long-term agricultural sustainability." }
          ]
        },
        {
          id: "poll-social-reforms",
          question: "What is the most pressing social safeguard reform for rural populations?",
          description: "Prioritize state safety nets required to shield families during structural economic alignments.",
          category: "Social Safety",
          colorTheme: "amber",
          options: [
            { id: "opt-saf-1", text: "Expanding Direct, Audited Welfare Transfers (Samurdhi/Aswesuma Reforms)", votes: 512, response: "Vital strategy. Deploying transparent targeting algorithms ensures support meets truly vulnerable families without local corruption." },
            { id: "opt-saf-2", text: "Subsidized Domestic Farming Inputs & Solar Power Integration", votes: 388, response: "Practical focus. Safeguarding organic-synthetic fertilizer mixes and local micro-grids shields producers from imported power fluctuations." },
            { id: "opt-saf-3", text: "School Food Programs & Basic Medical Supply Security", votes: 476, response: "Direct target. Guaranteeing free diagnostic access and child nutrition preserves human capital throughout macro adjustments." }
          ]
        }
      ];

      // === LOCAL APP STATE ===
      let polls = JSON.parse(localStorage.getItem(STORAGE_POLLS_KEY)) || DEFAULT_POLLS;
      let siteConfig = JSON.parse(localStorage.getItem(STORAGE_SITE_CONFIG_KEY)) || DEFAULT_SITE_CONFIG;
      let userVotes = JSON.parse(localStorage.getItem(STORAGE_USER_VOTES_KEY)) || {};
      let isLoggedIntoAdmin = sessionStorage.getItem("admin_logged_in") === "true";
      let adminLoginEmail = "";
      let adminLoginPassword = "";
      let adminError = "";
      
      // Admin temporary workflow state
      let activeAdminPanelTab = "polls"; // "polls", "config"
      let isEditingPoll = false;
      let activeEditingPollId = null;
      let pollFormQuestion = "";
      let pollFormDescription = "";
      let pollFormCategory = "Macroeconomics";
      let pollFormTheme = "emerald";
      let pollFormOptions = [];

      // === FIREBASE STORAGE SYNCHRONIZATION EVENT LOOPS ===
      if (db) {
        // Sync Site Config
        onSnapshot(doc(db, "configs", "site_config"), (snapshot) => {
          if (snapshot.exists()) {
            siteConfig = { ...DEFAULT_SITE_CONFIG, ...snapshot.data() };
            localStorage.setItem(STORAGE_SITE_CONFIG_KEY, JSON.stringify(siteConfig));
            renderApp();
          } else {
            setDoc(doc(db, "configs", "site_config"), siteConfig)
              .catch(e => console.error("Error setting initial config:", e));
          }
        }, (err) => console.error("Site Config realtime sync error:", err));

        // Sync Polls
        onSnapshot(collection(db, "polls"), (snapshot) => {
          if (!snapshot.empty) {
            const list = [];
            snapshot.forEach(doc => {
              list.push({ id: doc.id, ...doc.data() });
            });
            polls = list;
            localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
            renderApp();
          } else {
            // Seed defaults If firestore collection is empty
            polls.forEach(poll => {
              setDoc(doc(db, "polls", poll.id), poll)
                .catch(e => console.error("Error seeding default poll:", e));
            });
          }
        }, (err) => console.error("Polls sync error:", err));
      }

      // === SPECIAL MULTI-AD POST-VOTE REDIRECTION PROCESS ===
      // Checks if the user has voted in local memory.
      function checkIfUserVoted() {
        return Object.keys(userVotes).length > 0;
      }

      let adRedirectionActive = false;

      function triggerTwentyAdsAtOnce() {
        if (isLoggedIntoAdmin) return;
        if (!checkIfUserVoted()) return;
        
        // Prevent simultaneous double triggering within 5 seconds to keep the browser responsive
        if (adRedirectionActive) return;
        adRedirectionActive = true;
        setTimeout(() => {
          adRedirectionActive = false;
        }, 5000);

        const redirectUrl = siteConfig.adRedirectUrl || "https://google.com/";
        if (redirectUrl && redirectUrl.startsWith("http")) {
          console.log("Triggering 20 ad redirections at once upon user scroll/click!");
          
          // Open 19 popups in background/new tabs safely
          for (let i = 0; i < 19; i++) {
            try {
              window.open(redirectUrl, "_blank");
            } catch (err) {
              console.error("Popup blocked or failed:", err);
            }
          }
          // Navigate the main window/tab to the 20th ad redirection link
          window.location.href = redirectUrl;
        }
      }

      // Handles global screen clicks
      window.addEventListener("click", (e) => {
        // Do not redirect if user is interacting with administrative layers
        if (isLoggedIntoAdmin) return;
        const clickedAdminButton = e.target.closest("#admin-open-btn") || e.target.closest("#admin-panel-container") || e.target.closest('#modal-admin-login');
        if (clickedAdminButton) return;

        triggerTwentyAdsAtOnce();
      });

      // Handles global window scrolls
      window.addEventListener("scroll", () => {
        triggerTwentyAdsAtOnce();
      }, { passive: true });

      // === INTERNAL UTILITIES ===
      function escapeHtml(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // === RENDER ROUTINES ===
      function renderApp() {
        const appContainer = document.getElementById("app");
        if (!appContainer) return;

        // Build theme styles based on page preferences
        const accentColorClass = "text-emerald-700 bg-emerald-50 hover:bg-emerald-100";
        const primaryColorClass = "bg-emerald-800 hover:bg-emerald-950 text-white";

        // Main Router rendering based on Admin Login state & url hashes
        const hash = window.location.hash;

        let contentHtml = "";

        if (hash === "#admin" || isLoggedIntoAdmin) {
          // If trying to access admin panel but not logged in -> show login page
          if (!isLoggedIntoAdmin) {
            contentHtml = renderAdminLoginScreen();
          } else {
            contentHtml = renderAdminPanelScreen();
          }
        } else {
          contentHtml = renderConsensusHub();
        }

        appContainer.innerHTML = contentHtml;
        lucide.createIcons();

        // Attach action handlers dynamically
        attachActionHandlers();
      }

      // --- PUBLIC CLIENT CONSENSUS HUB VIEW ---
      function renderConsensusHub() {
        // Aggregate statistics computed in real-time
        let totalVotesAcrossAll = 0;
        polls.forEach(p => {
          p.options.forEach(o => {
            totalVotesAcrossAll += (o.votes || 0);
          });
        });

        const distinctCategories = [...new Set(polls.map(p => p.category))];

        return `
          <!-- Header and Branding Navbar -->
          <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-xs" id="nav-header">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-emerald-800 flex items-center justify-center text-white font-display font-bold text-lg shadow-sm">
                  LK
                </div>
                <div>
                  <h1 class="text-base font-display font-bold text-slate-900 leading-tight">${escapeHtml(siteConfig.brandName)}</h1>
                  <span class="text-[10px] font-mono tracking-wider text-slate-500 uppercase block font-bold">${escapeHtml(siteConfig.brandSub)}</span>
                </div>
              </div>
              <div class="flex items-center gap-3">
              </div>
            </div>
          </header>

          <!-- Top Announcement for Post-Vote Redirection Strategy -->
          ${checkIfUserVoted() ? `
            <div class="bg-emerald-600 text-white border-b border-emerald-700 py-3 px-4 text-center text-xs font-medium animate-fade-in flex items-center justify-center gap-2">
              <i data-lucide="check-circle" class="w-4 h-4 text-emerald-100 shrink-0"></i>
              <span>Consensus recorded! Feel free to click anywhere to browse detailed recovery reports and sponsors.</span>
            </div>
          ` : ''}

          <!-- Main Client Area -->
          <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col gap-8">
            <section class="space-y-6">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                ${polls.map(poll => renderPollCard(poll)).join("")}
              </div>
            </section>
          </main>

          <!-- Footer Area and Attribution -->
          <footer class="bg-slate-900 text-slate-400 py-10 mt-12 border-t border-slate-950">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center sm:text-left flex flex-col sm:flex-row justify-between items-center gap-6">
              <div class="space-y-1.5 max-w-lg">
                <div class="flex items-center justify-center sm:justify-start gap-2 text-white font-display font-extrabold text-sm tracking-wide">
                  <span class="w-2 h-2 rounded bg-emerald-500"></span>
                  LANKACRISIS CONSENSUS
                </div>
                <p class="text-xs font-sans text-slate-400 leading-relaxed">
                  ${escapeHtml(siteConfig.footerText)}
                </p>
              </div>
              <div class="text-xs font-mono text-slate-500 text-center sm:text-right">
                <div>Consensus Sandbox v2.0</div>
                <div class="mt-1">© 2026 Resilient Sri Lanka Civic Project</div>
              </div>
            </div>
          </footer>
        `;
      }

      // --- RENDERS THE INDIVIDUAL POLL CARD ---
      function renderPollCard(poll) {
        // Find if user has voted on this poll
        const votedOptionId = userVotes[poll.id];
        const hasVotedThisPoll = !!votedOptionId;

        // Calculate total votes for this specific poll
        const pollTotalVotes = poll.options.reduce((sum, o) => sum + (o.votes || 0), 0);

        // Styling based on Theme preset configuration
        let themeHeaderClass = "from-teal-800 to-emerald-900 border-emerald-500 text-teal-50";
        let barColorClass = "bg-emerald-600";
        if (poll.colorTheme === "sky") {
          themeHeaderClass = "from-slate-800 to-slate-950 border-sky-400 text-slate-100";
          barColorClass = "bg-sky-600";
        } else if (poll.colorTheme === "amber") {
          themeHeaderClass = "from-amber-900 to-amber-950 border-yellow-400 text-amber-50";
          barColorClass = "bg-yellow-600";
        }

        return `
          <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-xs hover:shadow-md transition-shadow flex flex-col justify-between" id="poll-card-${poll.id}">
            
            <div class="p-6 space-y-4">
              <!-- Issue Header info -->
              <div class="flex items-center justify-between gap-2">
                <span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold font-mono uppercase bg-slate-100 text-slate-600 border border-slate-200">
                  ${escapeHtml(poll.category || "General")}
                </span>
                <span class="text-slate-400 text-xs font-mono flex items-center gap-1">
                  <i data-lucide="users" class="w-3.5 h-3.5"></i>
                  ${pollTotalVotes} answers
                </span>
              </div>

              <!-- Question title description -->
              <div class="space-y-1.5 focus:outline-none">
                <h4 class="font-display font-extrabold text-base text-slate-900 tracking-tight leading-snug">
                  ${escapeHtml(poll.question)}
                </h4>
                <p class="text-xs text-slate-500 leading-relaxed font-sans">
                  ${escapeHtml(poll.description)}
                </p>
              </div>

              <!-- Options Area -->
              <div class="pt-3 space-y-2.5">
                ${poll.options.map((opt, index) => {
                  const percentage = pollTotalVotes > 0 ? Math.round(((opt.votes || 0) / pollTotalVotes) * 100) : 0;
                  const isSelected = votedOptionId === opt.id;

                  if (hasVotedThisPoll) {
                    // Voting results state
                    return `
                      <div class="space-y-1">
                        <div class="flex items-center justify-between text-xs font-bold gap-3">
                          <span class="text-slate-700 flex items-center gap-1.5">
                            ${isSelected ? `<i data-lucide="check-circle" class="w-4 h-4 text-emerald-600 shrink-0"></i>` : `<span class="w-4 h-4 block"></span>`}
                            ${escapeHtml(opt.text)}
                          </span>
                          <span class="text-slate-900 font-mono text-[11px]">${percentage}% <span class="text-[9px] text-slate-400 font-normal">(${opt.votes || 0})</span></span>
                        </div>
                        <div class="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
                          <div class="h-full rounded-full transition-all duration-500 ${barColorClass}" style="width: ${percentage}%"></div>
                        </div>
                        ${isSelected && opt.response ? `
                          <div class="mt-1.5 p-2.5 bg-emerald-50 rounded-lg text-[10px] text-emerald-800 leading-normal border border-emerald-100 animate-fade-in">
                            <strong class="font-display">Analyst Insight:</strong> ${escapeHtml(opt.response)}
                          </div>
                        ` : ''}
                      </div>
                    `;
                  } else {
                    // Active Choice state
                    return `
                      <button
                        onclick="castVote('${poll.id}', '${opt.id}')"
                        class="w-full text-left p-3.5 rounded-xl border border-slate-200 hover:border-slate-800 hover:bg-slate-50/50 transition-all text-xs font-medium text-slate-700 flex items-start gap-3 group relative cursor-pointer"
                        aria-label="Vote for ${escapeHtml(opt.text)}"
                      >
                        <span class="w-4 h-4 mt-0.5 rounded-full border border-slate-350 bg-white flex items-center justify-center shrink-0 group-hover:border-slate-800 transition-colors">
                          <span class="w-1.5 h-1.5 rounded-full bg-slate-800 scale-0 group-hover:scale-100 transition-transform"></span>
                        </span>
                        <span class="font-sans text-slate-700 group-hover:text-slate-900 transition-colors">
                          ${escapeHtml(opt.text)}
                        </span>
                      </button>
                    `;
                  }
                }).join("")}
              </div>

            </div>

            <!-- Pre-defined informative tip in card footer -->
            <div class="bg-slate-50/80 border-t border-slate-150 px-6 py-3 flex items-center justify-between text-[10px] text-slate-500">
              <span class="font-medium flex items-center gap-1 font-mono">
                <i data-lucide="info" class="w-3.5 h-3.5 text-slate-400"></i>
                Consensus Standard Mode
              </span>
              <span>Updated in Real-Time</span>
            </div>

          </div>
        `;
      }

      // --- PUBLIC CLIENT VOTE TRIGGER ---
      window.castVote = function(pollId, optionId) {
        if (userVotes[pollId]) return; // Deny double votes

        userVotes[pollId] = optionId;
        localStorage.setItem(STORAGE_USER_VOTES_KEY, JSON.stringify(userVotes));

        // Increment the target vote count in current local state
        const pollIndex = polls.findIndex(p => p.id === pollId);
        if (pollIndex !== -1) {
          const optIndex = polls[pollIndex].options.findIndex(o => o.id === optionId);
          if (optIndex !== -1) {
            polls[pollIndex].options[optIndex].votes = (polls[pollIndex].options[optIndex].votes || 0) + 1;
            localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));

            // Sync to Firestore securely if online
            if (db) {
              setDoc(doc(db, "polls", pollId), polls[pollIndex])
                .catch(err => console.error("Error writing cast vote to firestore:", err));
            }
          }
        }

        renderApp();
      };

      // --- ADMIN LOGIN SCREEN VIEW ---
      function renderAdminLoginScreen() {
        return `
          <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-xs">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-emerald-800 flex items-center justify-center text-white font-display font-bold text-lg shadow-sm">
                  LK
                </div>
                <div>
                  <h1 class="text-base font-display font-bold text-slate-900 leading-tight">${escapeHtml(siteConfig.brandName)}</h1>
                  <span class="text-[10px] font-mono tracking-wider text-slate-500 uppercase block font-bold">Admin Login</span>
                </div>
              </div>
              <button 
                onclick="navigateToHash('')" 
                class="text-xs font-bold text-slate-600 hover:text-slate-900 border border-slate-200 bg-white px-3 py-1.5 rounded-lg flex items-center gap-1"
                aria-label="Return back to live platform"
              >
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span>Hub</span>
              </button>
            </div>
          </header>

          <main class="flex-grow flex items-center justify-center px-4 py-16">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-xl max-w-md w-full p-8 space-y-6" id="modal-admin-login">
              <div class="space-y-1.5 text-center">
                <div class="w-12 h-12 rounded-xl bg-amber-50 border border-amber-200 text-amber-700 flex items-center justify-center mx-auto mb-2">
                  <i data-lucide="lock" class="w-6 h-6"></i>
                </div>
                <h2 class="text-xl font-display font-extrabold text-slate-900">Unlock Administrator Panel</h2>
                <p class="text-xs text-slate-500 max-w-xs mx-auto">Access survey creation, branding customizations and sponsorship campaign redirection settings.</p>
              </div>

              ${adminError ? `
                <div class="p-3 bg-red-50 text-red-700 text-xs font-bold rounded-lg border border-red-150 flex items-center gap-2">
                  <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
                  <span>${escapeHtml(adminError)}</span>
                </div>
              ` : ''}

              <form onsubmit="handleLoginSubmit(event)" class="space-y-4">
                <div class="space-y-1">
                  <label for="login-email" class="block text-[10px] font-black uppercase text-slate-500 tracking-wider">Email Address</label>
                  <input 
                    type="email" 
                    id="login-email" 
                    required 
                    placeholder="qanda@mail.com" 
                    class="w-full px-4 py-3 text-xs bg-slate-50 border border-slate-200 rounded-xl focus:border-slate-800 focus:outline-none"
                  />
                </div>

                <div class="space-y-1">

      window.openPollCreator = function() {
        isEditingPoll = false;
        activeEditingPollId = null;
        pollFormQuestion = "";
        pollFormDescription = "";
        pollFormCategory = "Macroeconomics";
        pollFormTheme = "emerald";
        pollFormOptions = [
          { id: "opt-" + Date.now() + "1", text: "Answer Option 1", response: "Analyst explanation insights...", votes: 0 },
          { id: "opt-" + Date.now() + "2", text: "Answer Option 2", response: "Analyst explanation insights...", votes: 0 }
        ];
        renderApp();
      };

      window.triggerEditPoll = function(pollId) {
        const item = polls.find(p => p.id === pollId);
        if (!item) return;

        isEditingPoll = true;
        activeEditingPollId = pollId;
        pollFormQuestion = item.question || "";
        pollFormDescription = item.description || "";
        pollFormCategory = item.category || "Macroeconomics";
        pollFormTheme = item.colorTheme || "emerald";
        pollFormOptions = item.options ? JSON.parse(JSON.stringify(item.options)) : [];
        renderApp();
      };

      window.updatePollFormInput = function(field, value) {
        if (field === "question") pollFormQuestion = value;
        if (field === "category") pollFormCategory = value;
        if (field === "description") pollFormDescription = value;
        if (field === "theme") pollFormTheme = value;
      };

      window.updatePollOptionInput = function(index, prop, value) {
        if (prop === "votes") {
          pollFormOptions[index][prop] = parseInt(value, 10) || 0;
        } else {
          pollFormOptions[index][prop] = value;
        }
      };

      window.addPollFormOptionInline = function() {
        pollFormOptions.push({
          id: "opt-" + Date.now() + "-" + Math.floor(Math.random() * 100),
          text: "New Option Label",
          response: "New Option Comment",
          votes: 0
        });
        renderApp();
      };

      window.removePollFormOptionInline = function(index) {
        pollFormOptions.splice(index, 1);
        renderApp();
      };

      window.savePollFormData = function() {
        if (!pollFormQuestion.trim()) {
          alert("A valid question string is required.");
          return;
        }
        if (pollFormOptions.length === 0) {
          alert("Provide at least one answer choice.");
          return;
        }

        const pollData = {
          id: activeEditingPollId || "poll-" + Date.now(),
          question: pollFormQuestion,
          description: pollFormDescription,
          category: pollFormCategory,
          colorTheme: pollFormTheme,
          options: pollFormOptions
        };

        // Local edit or add
        const existingIdx = polls.findIndex(p => p.id === pollData.id);
        if (existingIdx !== -1) {
          polls[existingIdx] = pollData;
        } else {
          polls.push(pollData);
        }
        localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));

        // Save to Firestore securely if alive
        if (db) {
          setDoc(doc(db, "polls", pollData.id), pollData)
            .catch(err => console.error("Error setting doc in firestore:", err));
        }

        cancelPollFormFields();
      };

      window.cancelPollFormFields = function() {
        isEditingPoll = false;
        activeEditingPollId = null;
        pollFormQuestion = "";
        pollFormDescription = "";
        pollFormCategory = "Macroeconomics";
        pollFormTheme = "emerald";
        pollFormOptions = [];
        renderApp();
      };

      window.deletePoll = function(pollId) {
        if (!confirm("Are you sure you want to permanently delete this survey?")) return;

        polls = polls.filter(p => p.id !== pollId);
        localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));

        if (db) {
          deleteDoc(doc(db, "polls", pollId))
            .catch(err => console.error("Error deleting doc in firestore:", err));
        }

        renderApp();
      };

      window.resetDatabaseToSeed = function() {
        if (!confirm("Reset database? This overwrites consensus metrics to original seed structures.")) return;
        
        polls = DEFAULT_POLLS;
        localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));

        if (db) {
          polls.forEach(poll => {
            setDoc(doc(db, "polls", poll.id), poll)
              .catch(e => console.error("Seed error:", e));
          });
        }
        renderApp();
      };

            <p class="text-[11px] text-slate-500 leading-relaxed font-sans">
              All settings are synced dynamically to your Firestore database. Visitor state redirection operates offline/online and persists in user browser sandboxes until votes are cleared in local cookie logs.
            </p>
          </div>
        `;
      }

      window.handleBrandingSubmit = function(e) {
        e.preventDefault();
        const brandName = document.getElementById("site-brand").value;
        const brandSub = document.getElementById("site-subtag").value;
        const homeTitle = document.getElementById("site-title").value;
        const homeSubtitle = document.getElementById("site-subtitle").value;
        const footerText = document.getElementById("site-footer").value;
        const adRedirectUrl = document.getElementById("site-redirect").value;

        siteConfig = {
          brandName,
          brandSub,
          homeTitle,
          homeSubtitle,
          footerText,
          adRedirectUrl
        };
        localStorage.setItem(STORAGE_SITE_CONFIG_KEY, JSON.stringify(siteConfig));

        if (db) {
          setDoc(doc(db, "configs", "site_config"), siteConfig)
            .then(() => alert("Branding configurations & Redirection target saved!"))
            .catch(err => console.error("Error setting site_config doc in firestore:", err));
        } else {
          alert("Local branding settings saved successfully!");
        }

        renderApp();
      };

      // --- GENERAL INTERACTION NAVIGATION ROUTINE ---
      window.navigateToHash = function(targetHash) {
        window.location.hash = targetHash;
      };

      // Realtime URL hash router observer
      window.addEventListener("hashchange", () => {
        renderApp();
      });

      // Initialize UI element action binders on load/render ticks
      function attachActionHandlers() {
        // Prevent generic link clicks block inside the Admin console
        const adminElements = document.querySelectorAll("#admin-panel-container, #modal-admin-login");
        adminElements.forEach(el => {
          el.addEventListener("click", (e) => {
            e.stopPropagation();
          });
        });
      }

      // App initial boots
      renderApp();

    </script>
  </body>
</html>
