      class CompatDocumentReference {
        constructor(db, path, docId, utils) {
          this.db = db;
          this.path = path;
          this.docId = docId;
          this.utils = utils;
        }
        onSnapshot(onNext, onError) {
          const docRef = this.utils.doc(this.db, this.path, this.docId);
          return this.utils.onSnapshot(docRef, function(snapshot) {
            onNext({
              exists: snapshot.exists(),
              data: function() { return snapshot.data(); }
            });
          }, onError);
        }
        set(data) {
          const docRef = this.utils.doc(this.db, this.path, this.docId);
          return this.utils.setDoc(docRef, data);
        }
        update(data) {
          const docRef = this.utils.doc(this.db, this.path, this.docId);
          const updatedData = {};
          for (const k in data) {
            if (data[k] && data[k].__type === "increment") {
              updatedData[k] = this.utils.increment(data[k].value);
            } else {
              updatedData[k] = data[k];
            }
          }
          return this.utils.updateDoc(docRef, updatedData);
        }
        delete() {
          const docRef = this.utils.doc(this.db, this.path, this.docId);
          return this.utils.deleteDoc(docRef);
        }
      }

      class CompatCollectionReference {
        constructor(db, path, utils) {
          this.db = db;
          this.path = path;
          this.utils = utils;
        }
        doc(docId) {
          return new CompatDocumentReference(this.db, this.path, docId, this.utils);
        }
        onSnapshot(onNext, onError) {
          const collRef = this.utils.collection(this.db, this.path);
          return this.utils.onSnapshot(collRef, function(snapshot) {
            onNext({
              empty: snapshot.empty,
              forEach: function(callback) {
                snapshot.forEach(function(doc) {
                  callback({
                    id: doc.id,
                    data: function() { return doc.data(); }
                  });
                });
              }
            });
          }, onError);
        }
      }

      class CompatFirestore {
        constructor(db, utils) {
          this.db = db;
          this.utils = utils;
        }
        collection(path) {
          return new CompatCollectionReference(this.db, path, this.utils);
        }

              if (!Array.isArray(parsed) || parsed.length !== INITIAL_POLLS.length) {
                syncWithEmbedded = true;
              } else {
                // Compare IDs, questions, and option choices count / text to spot admin modifications on GitHub
                const allMatch = INITIAL_POLLS.every(p => {
                  const local = parsed.find(lp => lp.id === p.id);
                  if (!local) return false;
                  if (local.question !== p.question) return false;
                  if (local.options.length !== p.options.length) return false;
                  return p.options.every((opt, oIdx) => local.options[oIdx] && local.options[oIdx].text === opt.text);
                });
                if (!allMatch) {
                  syncWithEmbedded = true;
                }
              }
            } catch (e) {
              syncWithEmbedded = true;
            }
          }

          if (storedPolls && !syncWithEmbedded) {
            polls = JSON.parse(storedPolls);
          } else if (storedPolls && syncWithEmbedded) {
            // Merge: preserve accumulated user vote numbers but load fresh question texts and choices
            try {
              const parsed = JSON.parse(storedPolls);
              polls = INITIAL_POLLS.map(p => {
                const localPoll = parsed.find(lp => lp.id === p.id);
                if (localPoll) {
                  return {
                    ...p,
                    options: p.options.map(opt => {
                      const localOpt = localPoll.options.find(lo => lo.id === opt.id);
                      return {
                        ...opt,
                        votes: localOpt ? (localOpt.votes || 0) : (opt.votes || 0)
                      };
                    })
                  };
                }
                return p;
              });
              localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
            } catch (e) {
              polls = INITIAL_POLLS;
              localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(INITIAL_POLLS));
            }
          } else {
            polls = INITIAL_POLLS;
            localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(INITIAL_POLLS));
          }

          // Smart Sponsor Ads synchronization: check if embedded INITIAL_ADS differs from local storage copy
          const storedAds = localStorage.getItem(STORAGE_ADS_KEY);
          let adsSyncWithEmbedded = false;
          if (storedAds) {
            try {
              const parsedAds = JSON.parse(storedAds);
              if (!Array.isArray(parsedAds) || parsedAds.length !== INITIAL_ADS.length) {
                adsSyncWithEmbedded = true;
              } else {
                const allAdsMatch = INITIAL_ADS.every(a => {
                  const local = parsedAds.find(la => la.id === a.id);
                  return local && 
                         local.title === a.title && 
                         local.isActive === a.isActive && 
                         local.integrationStyle === a.integrationStyle && 
                         local.linkUrl === a.linkUrl;
                });
                if (!allAdsMatch) {
                  adsSyncWithEmbedded = true;
                }
              }
            } catch (e) {
              adsSyncWithEmbedded = true;
            }
          }

          if (storedAds && !adsSyncWithEmbedded) {
            ads = JSON.parse(storedAds);
          } else {
            ads = INITIAL_ADS;
            localStorage.setItem(STORAGE_ADS_KEY, JSON.stringify(INITIAL_ADS));
          }

          // Smart Site Config synchronization: check if branding configurations have updated on GitHub
          const storedConfig = localStorage.getItem(STORAGE_SITE_CONFIG_KEY);
          let configSyncWithEmbedded = false;
          if (storedConfig) {
            try {

          polls = INITIAL_POLLS;

      // CORE USER VOTE EMISSION ACTIONS
      function castVote(pollId, optionId) {
        let updatedPoll = null;
        polls = polls.map(p => {
          if (p.id === pollId) {
            updatedPoll = {
              ...p,
              options: p.options.map(opt => {
                if (opt.id === optionId) {
                  return { ...opt, votes: opt.votes + 1 };
                }
                return opt;
              })
            };
            return updatedPoll;
          }
          return p;
        });

        userVotes[pollId] = optionId;
        localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
        localStorage.setItem(STORAGE_USER_VOTES_KEY, JSON.stringify(userVotes));
        renderApp();

        if (updatedPoll) {
          dbSavePoll(updatedPoll);
        }
      }

      function retractVote(pollId) {
        const previousVoteId = userVotes[pollId];
        if (!previousVoteId) return;

        let updatedPoll = null;
        polls = polls.map(p => {
          if (p.id === pollId) {
            updatedPoll = {
              ...p,
              options: p.options.map(opt => {
                if (opt.id === previousVoteId) {
                  return { ...opt, votes: Math.max(0, opt.votes - 1) };
                }
                return opt;
              })
            };
            return updatedPoll;
          }
          return p;
        });

        delete userVotes[pollId];
        localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
        localStorage.setItem(STORAGE_USER_VOTES_KEY, JSON.stringify(userVotes));
        renderApp();

        if (updatedPoll) {
          dbSavePoll(updatedPoll);
        }
      }

      function injectAdContainers() {
        const containers = document.querySelectorAll(".custom-ad-container");
        containers.forEach(container => {
          const adId = container.getAttribute("data-ad-id");
          const adProduct = ads.find(a => a.id === adId);
          if (adProduct && adProduct.useHtmlCode && adProduct.htmlCode) {
            container.innerHTML = adProduct.htmlCode;
            // Dynamically parse and execute all contained script logic to make custom ads work 100%
            const scripts = container.querySelectorAll("script");
            scripts.forEach(oldScript => {
              try {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
              } catch (err) {
                console.error("Failed to execute dynamic ad script:", err);
              }
            });
          }
        });
      }

          const matchedIdx = sortedPolls.findIndex(p => p.id === focusedPollId);

            const [matchedPoll] = sortedPolls.splice(matchedIdx, 1);
            sortedPolls.unshift(matchedPoll);

        // We can intersperse enabled In-Feed Ads inside the polls listing

        let listHTML = "";

                <!-- SOCIAL SHARING TOOLKIT -->
                <div class="p-4 bg-teal-50/40 rounded-2xl border border-teal-100/60 mt-4 text-xs animate-fade-in space-y-3">

          } else {

          // Interspace an active In-Feed Ad after every 1st or 2nd main card
          if ((idx === 0 || idx == 2) && activeInFeedAds[adIndexTracker]) {

            recordAdImpression(currentAd.id);
            
            if (currentAd.integrationStyle === "native-poll") {

              const optionsList = (currentAd.pollOptions || "Explore Campaign, Support Sponsors")
                .split(",")

              listHTML += `

                  <div class="p-6 sm:p-8 bg-white flex-grow flex flex-col justify-between">
                    <div class="space-y-2.5">
                      ${optionsList.map(opt => `
                        <button

                          style="min-height: 44px;"
                        >
                          <span class="truncate pr-3 text-[#064e43] font-bold">${opt}</span>
                          <span class="w-5.5 h-5.5 rounded-lg bg-teal-50 border border-teal-150 text-teal-600 flex items-center justify-center shrink-0 group-hover:bg-[#064e43] group-hover:text-white group-hover:border-[#064e43] transition-colors">

                          </span>

                      `).join("")}

                    <div class="pt-4 mt-4 border-t border-slate-100 flex items-center justify-between">
                      <span class="text-[9px] font-mono text-slate-400 font-extrabold uppercase">Patron Engagement Hub</span>
                      <span class="text-[9px] font-sans font-bold text-[#064e43] tracking-wide">Sponsored Connection</span>
                    </div>
                  </div>

                </div>
              `;
            } else if (currentAd.useHtmlCode && currentAd.htmlCode) {
              listHTML += `
                <div class="bg-white rounded-3xl overflow-hidden border border-slate-150 p-6 flex flex-col justify-center items-center shadow-sm hover:shadow-md transition-shadow relative animate-fade-in min-h-[380px]">
                  <div class="w-full custom-ad-container flex justify-center" data-ad-id="${currentAd.id}">
                    <!-- Custom HTML snippet loaded dynamically on tick -->
                  </div>
                </div>
              `;
            } else {
              // Classic Sponsor Ad Card
              listHTML += `
                <div class="bg-white rounded-3xl overflow-hidden border border-slate-150 p-6 sm:p-8 flex flex-col justify-between shadow-sm hover:shadow-md transition-shadow relative animate-fade-in min-h-[380px]">
                  
                  <div>
                    <div class="flex items-center justify-between gap-2 mb-4">
                      <span id="ad-toast-${currentAd.id}" class="inline-flex px-2 py-0.5 rounded text-[8px] font-black uppercase tracking-widest bg-amber-500 text-white min-h-[16px] leading-none">
                        ${currentAd.badgeText || "COMMUNITY SPONSOR"}
                      </span>
                      <span class="text-[9px] font-mono text-slate-400 font-extrabold uppercase">Patron Alert</span>
                    </div>
 
                    ${currentAd.imageUrl ? `
                      <div class="w-full h-36 rounded-2xl overflow-hidden mb-4 bg-slate-100 border border-slate-150">
                        <img 
                          src="${currentAd.imageUrl}" 
                          alt="Ad promotion graphics" 
                          class="w-full h-full object-cover"
                          referrerpolicy="no-referrer"
                        />
                      </div>
                    ` : ""}
 
                    <h4 class="font-sans font-extrabold text-[#064e43] text-sm sm:text-base leading-tight">
                      ${currentAd.title}
                    </h4>
                    <p class="font-sans text-xs text-slate-500 mt-2 leading-relaxed">
                      ${currentAd.description}
                    </p>
                  </div>
 
                  <div class="pt-5 mt-4 border-t border-slate-100 flex items-center justify-between">
                    <span class="text-[10px] font-mono font-bold text-slate-400">SUPPORT OUTREACH</span>
                    <button
                      onclick="recordAdClick('${currentAd.id}', '${currentAd.linkUrl}')"
                      class="px-4 py-2 bg-[#064e43] hover:bg-[#033a31] text-xs font-bold text-white rounded-xl transition-all inline-flex items-center gap-1.5 cursor-pointer"
                    >
                      <span>${currentAd.buttonText || "Contribute Care"}</span>
                      <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
                    </button>
                  </div>

            }
            adIndexTracker++;

        return `

      /* =========================================================================
         VIEWPORT: COLLECTIVE STATS (COMPARATIVE DEMOCRACY CHARTS)
         ========================================================================= */
      function renderStatsRoute() {
        if (polls.length === 0) {
          return `
            <div class="text-center py-20 bg-white rounded-2xl border border-slate-150 shadow-sm max-w-lg mx-auto p-8 animate-fade-in">
              <i data-lucide="bar-chart-3" class="w-12 h-12 text-slate-350 mx-auto mb-3"></i>
              <h3 class="font-sans font-bold text-slate-800 text-base">No Data Visualizations Available</h3>
            </div>
          `;
        }

        // Aggregate statistics telemetry
        let grandVotesSum = 0;
        let differentClusterCount = new Set();
        let currentLeadingCandidate = "None Registered";
        let leadingConsentCount = 0;

        polls.forEach(p => {
          differentClusterCount.add(p.category);
          p.options.forEach(o => {
            grandVotesSum += o.votes;
            if (o.votes > leadingConsentCount) {
              leadingConsentCount = o.votes;
              currentLeadingCandidate = `"${o.text}" — ${p.category}`;
            }
          });
        });

        return `
          <div class="space-y-10 animate-fade-in">
            <!-- Numerical aggregation layout banner grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
              
              <div class="bg-white rounded-2xl p-5 border border-slate-150 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-teal-50 text-[#064e43] flex items-center justify-center shrink-0 border border-teal-100">
                  <i data-lucide="gauge" class="w-6 h-6"></i>
                </div>
                <div>
                  <span class="font-mono text-[9px] text-slate-400 font-extrabold uppercase tracking-widest block leading-none">Aggregate Votes</span>
                  <span class="font-sans font-black text-slate-900 text-xl block mt-1 leading-none">${grandVotesSum} Samples</span>
                  <span class="font-sans text-[10px] text-slate-450 mt-1 block">Authentic state surveys</span>
                </div>
              </div>

              <div class="bg-white rounded-2xl p-5 border border-slate-150 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-sky-50 text-sky-700 flex items-center justify-center shrink-0 border border-sky-100">
                  <i data-lucide="layers" class="w-6 h-6"></i>
                </div>
                <div>
                  <span class="font-mono text-[9px] text-slate-400 font-extrabold uppercase tracking-widest block leading-none">Thematic Channels</span>
                  <span class="font-sans font-black text-slate-900 text-xl block mt-1 leading-none">${polls.length} Active</span>
                  <span class="font-sans text-[10px] text-slate-450 mt-1 block">Focus recovery topics</span>
                </div>
              </div>

              <div class="bg-white rounded-2xl p-5 border border-slate-150 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-rose-50 text-rose-700 flex items-center justify-center shrink-0 border border-rose-100">
                  <i data-lucide="tag" class="w-6 h-6"></i>
                </div>
                <div>
                  <span class="font-mono text-[9px] text-slate-400 font-extrabold uppercase tracking-widest block leading-none">Categories Focused</span>
                  <span class="font-sans font-black text-slate-900 text-xl block mt-1 leading-none">${differentClusterCount.size} Domains</span>
                  <span class="font-sans text-[10px] text-slate-450 mt-1 block">Multi-disciplinary audits</span>
                </div>
              </div>

              <div class="bg-white rounded-2xl p-5 border border-slate-150 shadow-sm flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-amber-50 text-amber-700 flex items-center justify-center shrink-0 border border-amber-100">
                  <i data-lucide="sparkles" class="w-6 h-6"></i>
                </div>
                <div class="min-w-0">
                  <span class="font-mono text-[9px] text-slate-400 font-extrabold uppercase tracking-widest block leading-none">Primary Consensus</span>
                  <span class="font-sans font-black text-slate-900 text-xs block mt-1 truncate max-w-full">${currentLeadingCandidate}</span>
                  <span class="font-sans text-[10px] text-slate-450 mt-1 block shrink-0">${leadingConsentCount} lead votes</span>
                </div>
              </div>

            </div>

            <!-- Highly styled comparative analytics cards layout with Micro-Charts -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
              ${polls.map(p => {
                const singlePollVotesTotal = p.options.reduce((sum, o) => sum + o.votes, 0);
                return `
                  <div class="bg-white p-6 sm:p-8 rounded-3xl border border-slate-150 shadow-sm space-y-6">
                    <div>
                      <div class="flex justify-between items-start">
                        <span class="inline-flex px-2 py-0.5 rounded text-[8px] font-black uppercase tracking-widest bg-slate-100 text-slate-600">
                          ${p.category}
                        </span>
                        <span class="font-mono text-[10px] text-slate-450 font-bold uppercase">${singlePollVotesTotal} total responses</span>
                      </div>
                      <h4 class="font-sans font-bold text-slate-900 text-sm sm:text-base mt-2.5">
                        ${p.question}

                    <div class="space-y-4 pt-1">
                      ${p.options.map(opt => {
                        const ratio = singlePollVotesTotal > 0 ? Math.round((opt.votes / singlePollVotesTotal) * 100) : 0;

      function triggerDatabaseJsonExport() {
        const fullBackup = {
          polls: polls,
          ads: ads,
          siteConfig: siteConfig
        };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(fullBackup, null, 2));

        dlAnchor.setAttribute("href", dataStr);

      function triggerDatabaseRawJsonRestore() {
        const area = document.getElementById("raw-json-textarea");
        if (!area) return;
        try {
          const parsed = JSON.parse(area.value);
          if (!parsed.polls || !parsed.ads || !parsed.siteConfig) {
            alert("Malformed database layout structure. Please check your properties.");
            return;
          }
          polls = parsed.polls;
          ads = parsed.ads;
          siteConfig = parsed.siteConfig;
          
          localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
          localStorage.setItem(STORAGE_ADS_KEY, JSON.stringify(ads));
          localStorage.setItem(STORAGE_SITE_CONFIG_KEY, JSON.stringify(siteConfig));
          
          alert("Raw JSON configuration successfully validated and integrated!");
          syncAdminFormFields();
          renderApp();
          dbSyncAll();
        } catch (err) {
          alert("Syntax Error parsing JSON structure: " + err.message);

          parseUploadJsonDiskFile(e.dataTransfer.files[0]);

      function parseUploadJsonDiskFile(file) {
        const reader = new FileReader();
        const errorBox = document.getElementById("import-error-msg");
        const successBox = document.getElementById("import-success-msg");
        
        if (errorBox) errorBox.classList.add("hidden");
        if (successBox) successBox.classList.add("hidden");

        reader.onload = function(evt) {
          try {
            const parsed = JSON.parse(evt.target.result);
            if (!parsed.polls || !parsed.ads || !parsed.siteConfig) {
              throw new Error("Missing parent properties ('polls', 'ads' or 'siteConfig'). Check backup schema.");
            }
            polls = parsed.polls;
            ads = parsed.ads;
            siteConfig = parsed.siteConfig;

            localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
            localStorage.setItem(STORAGE_ADS_KEY, JSON.stringify(ads));
            localStorage.setItem(STORAGE_SITE_CONFIG_KEY, JSON.stringify(siteConfig));

            if (successBox) {
              successBox.innerText = `Verified successfully! Integrated ${polls.length} Polls, ${ads.length} Ads.`;
              successBox.classList.remove("hidden");
            }
            syncAdminFormFields();
            renderApp();
            dbSyncAll();
          } catch(err) {
            if (errorBox) {
              errorBox.innerText = "Check failed: " + err.message;
              errorBox.classList.remove("hidden");
            }
          }
        }
        reader.readAsText(file);
      }

      async function handleGitHubDeploymentForm(e) {
        e.preventDefault();

        // Safely extract latest configured parameters directly from DOM nodes to avoid keyup bugs/pasting lag
        const repoInput = document.getElementById("git-input-repo");
        const branchInput = document.getElementById("git-input-branch");
        const pathInput = document.getElementById("git-input-path");
        const tokenInput = document.getElementById("git-input-token");

        if (repoInput) {
          githubRepo = repoInput.value.trim();
          localStorage.setItem("github_repo", githubRepo);
        }
        if (branchInput) {
          githubBranch = branchInput.value.trim();
          localStorage.setItem("github_branch", githubBranch);
        }
        if (pathInput) {
          githubFilePath = pathInput.value.trim();
          localStorage.setItem("github_file_path", githubFilePath);
        }
        if (tokenInput) {
          githubToken = tokenInput.value.trim();
          localStorage.setItem("github_token", githubToken);
        }

        githubStatus = "loading";
        githubStatusMsg = "";
        renderApp();

        try {
          // 1. Fetch current index.html from github repo to secure SHA
          const detailsUrl = `https://api.github.com/repos/${githubRepo.trim()}/contents/${githubFilePath.trim()}?ref=${githubBranch.trim()}`;
          let currentSha = "";

          const response = await fetch(detailsUrl, {
            method: "GET",
            headers: {
              "Authorization": "token " + githubToken.trim(),
              "Accept": "application/vnd.github.v3+json"
            }
          });

          if (response.status === 200) {
            const data = await response.json();
            currentSha = data.sha;
          } else if (response.status === 404) {
            // File does not exist on GitHub yet, we can create it
            console.log("Existing target file not found on GitHub. Committing new file...");
          } else {
            const errData = await response.json().catch(() => ({ message: "Unknown repository connection response" }));
            throw new Error(`Failed to check repository details (Status ${response.status}): ${errData.message}`);
          }

          // 2. Fetch compile baseline layout code from local server environment
          const appOrigin = window.location.origin;
          let searchPrefix = window.location.pathname;
          // Clean admin and index.html suffixes to determine correct routing prefix in all environments
          searchPrefix = searchPrefix.replace(/\/admin\/?$/i, '');
          searchPrefix = searchPrefix.replace(/\/index\.html\/?$/i, '');
          const htmlFetchUrl = appOrigin + (searchPrefix.endsWith('/') ? searchPrefix : searchPrefix + '/') + "index.html";
          
          let cleanSourceTemplate = "";
          try {
            const localResp = await fetch(htmlFetchUrl);
            if (localResp.status === 200) {
              cleanSourceTemplate = await localResp.text();
            } else {
              throw new Error("Local server resource returned Status " + localResp.status);
            }
          } catch (e) {
            throw new Error("Unable to read index.html base layout template to compile presets: " + e.message);
          }

          // 3. Perform regex/anchor substitutions to inject the absolute configurations
          let compiledSource = cleanSourceTemplate;
          
          // Embed Config
          compiledSource = compiledSource.replace(
            /\/\/ === SITE CONFIG DATA START ===[\s\S]*?\/\/ === SITE CONFIG DATA END ===/,
            `// === SITE CONFIG DATA START ===\n      const DEFAULT_SITE_CONFIG = ${JSON.stringify(siteConfig, null, 2)};\n      // === SITE CONFIG DATA END ===`
          );

          // Embed Polls
          compiledSource = compiledSource.replace(
            /\/\/ === INITIAL POLLS DATA START ===[\s\S]*?\/\/ === INITIAL POLLS DATA END ===/,
            `// === INITIAL POLLS DATA START ===\n      const INITIAL_POLLS = ${JSON.stringify(polls, null, 2)};\n      // === INITIAL POLLS DATA END ===`
          );

          // Embed Ads
          compiledSource = compiledSource.replace(
            /\/\/ === INITIAL ADS DATA START ===[\s\S]*?\/\/ === INITIAL ADS DATA END ===/,
            `// === INITIAL ADS DATA START ===\n      const INITIAL_ADS = ${JSON.stringify(ads, null, 2)};\n      // === INITIAL ADS DATA END ===`
          );

          // 4. Encode to base64 supporting unicode/Sri Lankan character sets perfectly
          const utf8Bytes = new TextEncoder().encode(compiledSource);
          let binary = "";
          const len = utf8Bytes.byteLength;
          for (let i = 0; i < len; i++) {
            binary += String.fromCharCode(utf8Bytes[i]);
          }
          const base64EncodedPayload = btoa(binary);

          // 5. Commit & push using GitHub PUT API
          const payloadBody = {
            message: "Update LankaCrisis Q&A Content database & configurations [Compiled from Admin Portal]",
            content: base64EncodedPayload,
            branch: githubBranch.trim()
          };
          if (currentSha) {
            payloadBody.sha = currentSha;
          }

          const putResponse = await fetch(`https://api.github.com/repos/${githubRepo.trim()}/contents/${githubFilePath.trim()}`, {
            method: "PUT",
            headers: {
              "Authorization": "token " + githubToken.trim(),
              "Content-Type": "application/json",
              "Accept": "application/vnd.github.v3+json"
            },
            body: JSON.stringify(payloadBody)
          });

          if (putResponse.status === 200 || putResponse.status === 201) {
            githubStatus = "success";
            githubStatusMsg = "";
          } else {
            const errData = await putResponse.json().catch(() => ({ message: "Unknown put transmission error" }));
            throw new Error(`GitHub API push failed (Status ${putResponse.status}): ${errData.message}`);
          }

        } catch(err) {
          githubStatus = "error";
          githubStatusMsg = err.message || err;
        }

        renderApp();
      }


      /* =========================================================================
         AUTHORIZED BACKSTAGE CALCULATOR HANDLERS & BUFFER UPDATE ROUTINES
         ========================================================================= */

      // POLLS MUTATOR HANDLERS
      function updatePollFormState(field, value) {
        if (field === 'question') {
          pollFormQuestion = value;
          const label = document.getElementById("poll-input-q");
          if (label) label.value = value;
        } else if (field === 'category') {
          pollFormCategory = value;
        } else if (field === 'description') {
          pollFormDescription = value;
        } else if (field === 'colorPreset') {
          pollFormSelectedColorIdx = value;
        } else if (field === 'customBg') {
          pollFormCustomBg = value;
        } else if (field === 'customText') {
          pollFormCustomText = value;
        }
        renderApp();
      }

      function updateOptionValue(index, property, value) {
        if (property === 'votes') {
          pollFormOptions[index].votes = Math.max(0, parseInt(value) || 0);
        } else {
          pollFormOptions[index][property] = value;
        }
      }

      function addPollOptionFormRow() {
        pollFormOptions.push({
          text: "",
          response: "",
          votes: 0
        });
        renderApp();
      }

      function removePollOptionFormRow(index) {
        pollFormOptions = pollFormOptions.filter((_, i) => i !== index);
        renderApp();
      }

      function savePollEntity(e) {
        e.preventDefault();
        const warnBox = document.getElementById("polls-warning-box");
        const warnText = document.getElementById("polls-warning-box-text");
        if (warnBox) warnBox.classList.add("hidden");

        // Validate basic criteria checks
        if (!pollFormQuestion.trim() || !pollFormCategory.trim() || !pollFormDescription.trim()) {
          if (warnBox && warnText) {
            warnText.innerText = "Please complete all active text boxes before submitting.";
            warnBox.classList.remove("hidden");
          }
          return;
        }

        const missingAnswers = pollFormOptions.some(opt => !opt.text.trim() || !opt.response.trim());
        if (missingAnswers) {
          if (warnBox && warnText) {
            warnText.innerText = "All choice options require both active option text labels and custom response insights.";
            warnBox.classList.remove("hidden");
          }
          return;
        }

        // Color mapping resolve
        let solvedBg = "";
        let solvedText = "";
        if (pollFormSelectedColorIdx !== -1) {
          const preset = COLOR_PRESETS[pollFormSelectedColorIdx];
          solvedBg = preset.bg;
          solvedText = preset.text;
        } else {
          solvedBg = pollFormCustomBg.trim() || "bg-slate-900 border-b-4 border-emerald-400";
          solvedText = pollFormCustomText.trim() || "text-slate-100";
        }

        let solvedAccent = "";
        if (solvedBg.includes("emerald") || solvedBg.includes("#064e43")) {
          solvedAccent = "bg-[#064e43] hover:bg-[#043d34] text-white";
        } else if (solvedBg.includes("slate") || solvedBg.includes("sapphire") || solvedBg.includes("zinc")) {
          solvedAccent = "bg-slate-900 hover:bg-slate-850 text-white";
        } else if (solvedBg.includes("ruby") || solvedBg.includes("red") || solvedBg.includes("rose")) {
          solvedAccent = "bg-rose-900 hover:bg-rose-955 text-white";
        } else {
          solvedAccent = "bg-teal-900 hover:bg-teal-950 text-white";
        }

        let savedPoll = null;
        if (isEditingPoll && editingPollId) {
          // Perform record override update
          polls = polls.map(p => {
            if (p.id === editingPollId) {
              savedPoll = {
                ...p,
                question: pollFormQuestion.trim(),
                description: pollFormDescription.trim(),
                category: pollFormCategory.trim(),
                headingColor: solvedBg,
                textColor: solvedText,
                accentColor: solvedAccent,
                options: pollFormOptions.map((o, idx) => ({
                  id: o.id || `opt-${Date.now()}-${idx}`,
                  text: o.text.trim(),
                  response: o.response.trim(),
                  votes: o.votes || 0
                }))
              };
              return savedPoll;
            }
            return p;
          });
        } else {
          // Initialize fresh new record entry parameters
          const freshId = `poll-${Date.now()}`;
          savedPoll = {
            id: freshId,
            question: pollFormQuestion.trim(),
            description: pollFormDescription.trim(),
            category: pollFormCategory.trim(),
            headingColor: solvedBg,
            textColor: solvedText,
            accentColor: solvedAccent,
            options: pollFormOptions.map((o, idx) => ({
              id: `opt-${freshId}-${idx}`,
              text: o.text.trim(),
              response: o.response.trim(),
              votes: o.votes || 0
            }))
          };
          polls = [savedPoll, ...polls];
        }

        localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
        resetPollFormBuffers();
        renderApp();

        if (savedPoll) {
          dbSavePoll(savedPoll);
        }
      }

      function triggerEditPoll(id) {
        const matchingRecord = polls.find(p => p.id === id);
        if (!matchingRecord) return;

        isEditingPoll = true;
        editingPollId = id;
        pollFormQuestion = matchingRecord.question;
        pollFormCategory = matchingRecord.category;
        pollFormDescription = matchingRecord.description;

        const presetIdx = COLOR_PRESETS.findIndex(c => c.bg === matchingRecord.headingColor);
        if (presetIdx !== -1) {
          pollFormSelectedColorIdx = presetIdx;
          pollFormCustomBg = "";
          pollFormCustomText = "";
        } else {
          pollFormSelectedColorIdx = -1;
          pollFormCustomBg = matchingRecord.headingColor;
          pollFormCustomText = matchingRecord.textColor;
        }

        pollFormOptions = matchingRecord.options.map(o => ({
          id: o.id,
          text: o.text,
          response: o.response,
          votes: o.votes
        }));

        renderApp();
        window.scrollTo({ top: 120, behavior: "smooth" });
      }

      function resetPollFormBuffers() {
        isEditingPoll = false;
        editingPollId = null;
        pollFormQuestion = "";
        pollFormCategory = "Macroeconomics";
        pollFormDescription = "";
        pollFormSelectedColorIdx = 0;
        pollFormCustomBg = "";
        pollFormCustomText = "";
        pollFormOptions = [
          { text: "Option A", response: "Excellent analysis on stabilization guidelines.", votes: 0 },
          { text: "Option B", response: "Very sensible approach to public accountability.", votes: 0 },
          { text: "Option C", response: "Plausible reform pathway. Reliability remains paramount.", votes: 0 }
        ];
        renderApp();
      }

      function deletePollRecord(id) {
        if (confirm("Are you sure you want to permanently delete this poll? All user accumulated sample votes will be dropped.")) {
          polls = polls.filter(p => p.id !== id);
          localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
          if (editingPollId === id) {
            resetPollFormBuffers();
          } else {
            renderApp();
          }
          dbDeletePoll(id);
        }
      }

      function resetAllSurveyVotes() {
        if (confirm("Are you sure you want to reset all survey accumulated votes indicators back to 0? This sweeps your civic telemetry database clean.")) {
          polls = polls.map(p => ({
            ...p,
            options: p.options.map(o => ({ ...o, votes: 0 }))
          }));
          localStorage.setItem(STORAGE_POLLS_KEY, JSON.stringify(polls));
          userVotes = {};
          localStorage.removeItem(STORAGE_USER_VOTES_KEY);
          resetPollFormBuffers();

          if (firebaseReady && db) {
            polls.forEach(function(poll) {
              dbSavePoll(poll);
            });
          }
        }
      }


      // DYNAMIC SPONSOR/ADS MUTATOR HANDLERS
      function resetAdStatistics() {
        if (confirm("Reset all sponsor click and impression telemetry metrics back to zero?")) {
          adStats = { impressions: {}, clicks: {} };
          localStorage.setItem(STORAGE_AD_STATS_KEY, JSON.stringify(adStats));
          renderApp();
        }
      }

      function saveAdCampaign(e) {
        e.preventDefault();
        
        if (adFormUseHtmlCode) {
          if (!adFormTitle.trim() || !adFormHtmlCode.trim()) {
            alert("Identification title and custom tag script are required when Custom Code mode is active.");
            return;
          }
        } else {
          if (!adFormTitle.trim() || !adFormDescription.trim() || !adFormLinkUrl.trim()) {
            MapAlert = "All campaign parameters require complete text descriptors.";
            alert(MapAlert);
            return;
          }
        }

        let savedAd = null;
        if (isEditingAd && editingAdId) {
          // Target override updates
          ads = ads.map(a => {
            if (a.id === editingAdId) {
              savedAd = {
                ...a,
                title: adFormTitle.trim(),
                description: adFormUseHtmlCode ? "" : adFormDescription.trim(),
                imageUrl: adFormUseHtmlCode ? "" : adFormImageUrl.trim(),
                linkUrl: adFormUseHtmlCode ? "" : adFormLinkUrl.trim(),
                badgeText: adFormBadgeText.trim() || (adFormUseHtmlCode ? "Sponsored Ad" : "Sponsored Campaign"),
                position: adFormPosition,
                buttonText: adFormUseHtmlCode ? "" : (adFormButtonText.trim() || "Learn More"),
                isActive: adFormIsActive,
                useHtmlCode: adFormUseHtmlCode,
                htmlCode: adFormHtmlCode,
                integrationStyle: adFormUseHtmlCode ? "standard" : adFormIntegrationStyle,
                pollOptions: adFormPollOptions
              };
              return savedAd;
            }
            return a;
          });
        } else {
          // fresh card generation parameters
          const recordId = `ad-${Date.now()}`;
          savedAd = {
            id: recordId,
            title: adFormTitle.trim(),
            description: adFormUseHtmlCode ? "" : adFormDescription.trim(),
            imageUrl: adFormUseHtmlCode ? "" : adFormImageUrl.trim(),
            linkUrl: adFormUseHtmlCode ? "" : adFormLinkUrl.trim(),
            badgeText: adFormBadgeText.trim() || (adFormUseHtmlCode ? "Sponsored Ad" : "Sponsored Campaign"),
            position: adFormPosition,
            buttonText: adFormUseHtmlCode ? "" : (adFormButtonText.trim() || "Learn More"),
            isActive: adFormIsActive,
            useHtmlCode: adFormUseHtmlCode,
            htmlCode: adFormHtmlCode,
            integrationStyle: adFormUseHtmlCode ? "standard" : adFormIntegrationStyle,
            pollOptions: adFormPollOptions,
            impressions: 0,
            clicks: 0
          };
          ads = [savedAd, ...ads];
        }

        localStorage.setItem(STORAGE_ADS_KEY, JSON.stringify(ads));
        resetAdFormBuffers();
        renderApp();

        if (savedAd) {
          dbSaveAd(savedAd);
        }
      }

      function triggerEditAd(id) {
        const item = ads.find(a => a.id === id);
        if (!item) return;

        isEditingAd = true;
        editingAdId = id;
        adFormTitle = item.title;
        adFormDescription = item.description || "";
        adFormImageUrl = item.imageUrl || "";
        adFormLinkUrl = item.linkUrl || "";
        adFormBadgeText = item.badgeText || "Sponsored Campaign";
        adFormPosition = item.position || "In-Feed";
        adFormButtonText = item.buttonText || "Learn More";
        adFormIsActive = item.isActive;
        adFormUseHtmlCode = item.useHtmlCode || false;
        adFormHtmlCode = item.htmlCode || "";
        adFormIntegrationStyle = item.integrationStyle || "standard";
        adFormPollOptions = item.pollOptions || "Support Certified Organic Producers, Invest in Clean Solar Infrastructure";

        renderApp();
        window.scrollTo({ top: 120, behavior: "smooth" });
      }

      function resetAdFormBuffers() {
        isEditingAd = false;
        editingAdId = null;
        adFormTitle = "";
        adFormDescription = "";
        adFormImageUrl = "";
        adFormLinkUrl = "";
        adFormBadgeText = "Sponsored Campaign";
        adFormPosition = "In-Feed";
        adFormButtonText = "Learn More";
        adFormIsActive = true;
        adFormUseHtmlCode = false;
        adFormHtmlCode = "";
        adFormIntegrationStyle = "standard";
        adFormPollOptions = "Support Certified Organic Producers, Invest in Clean Solar Infrastructure";
        renderApp();
      }

      function deleteAdCampaignRecord(id) {
        if (confirm("Are you sure you want to drop this promotional ad campaign? It will disappear from all user frames immediately.")) {
          ads = ads.filter(a => a.id !== id);
          localStorage.setItem(STORAGE_ADS_KEY, JSON.stringify(ads));
          if (editingAdId === id) {
            resetAdFormBuffers();
          } else {
            renderApp();
          }
          dbDeleteAd(id);
        }
      }

      function toggleAdActiveState(id) {
        let updatedAd = null;
        ads = ads.map(a => {
          if (a.id === id) {
            updatedAd = { ...a, isActive: !a.isActive };
            return updatedAd;
          }
          return a;
        });
        localStorage.setItem(STORAGE_ADS_KEY, JSON.stringify(ads));
        renderApp();

        if (updatedAd) {
          dbSaveAd(updatedAd);
        }
      }


      // BRAND IDENTITY BRANDING CONFIG SAVING
      function updateDynamicNavItemProperty(index, property, value) {
        siteFormNavItems[index][property] = value;

      function addDynamicNavItemRow() {
        siteFormNavItems.push({
          id: `nav-${Date.now()}`,
          label: "Consensus Forum",
          path: `/custom-${siteFormNavItems.length}`,
          iconName: "HelpCircle",
          badgeText: ""
        });
        renderApp();
      }

      function removeDynamicNavItemRow(index) {
        if (siteFormNavItems.length <= 1) {
          alert("You require at least one active navigation item target link.");
          return;
        }
        siteFormNavItems = siteFormNavItems.filter((_, idx) => idx !== index);
        renderApp();
      }

      function saveSiteBrandingConfigs(e) {
        e.preventDefault();
        
        const successAlet = document.getElementById("site-success-alert-box");
        if (successAlet) successAlet.classList.add("hidden");

        if (!siteFormBrandName.trim() || !siteFormHomeTitle.trim() || !siteFormHomeSubtitle.trim()) {
          alert("Fields matching brand logo, headline title, and descript intro are strictly required.");
          return;
        }

        const emptyPaths = siteFormNavItems.some(n => !n.label.trim() || !n.path.trim());
        if (emptyPaths) {
          alert("Each active menu link requires an unambiguous label and routing key target path.");
          return;
        }

        // commit configurations state sync
        siteConfig = {
          brandName: siteFormBrandName.trim(),
          brandSub: siteFormBrandSub.trim(),
          homeTitle: siteFormHomeTitle.trim(),
          homeSubtitle: siteFormHomeSubtitle.trim(),
          primaryAccentColor: siteFormPrimaryAccent.trim() || "bg-[#064e43]",
          accentTextColor: siteFormAccentText.trim() || "text-[#064e43]",
          footerText: siteFormFooterText.trim() || "A transparent platform for civic perspectives.",
          navItems: siteFormNavItems
        };

        localStorage.setItem(STORAGE_SITE_CONFIG_KEY, JSON.stringify(siteConfig));
        
        if (successAlet) {
          successAlet.classList.remove("hidden");
          window.scrollTo({ top: 120, behavior: "smooth" });
          setTimeout(() => {
            successAlet.classList.add("hidden");
          }, 3500);
        }

        renderApp();
        dbSaveSiteConfig();
      }

      // LAUNCH THE CIVIC PERSPECTIVE ENGINE
      initAppState();
      initFirebaseEngine();
      renderApp();
